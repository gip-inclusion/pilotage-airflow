version: 2

models:

  - name : dim_thematiques_clpe
    description: >
     Table de dimension contenant les données de thematiques CLPE. Est basée sur int_thematiques_clpe.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('int_thematiques_clpe')

  - name : fct_nombre_freins
    description: >
     Table de dimension contenant les données de thematiques CLPE. Est basée sur fct_nombre_freins.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('int_thematiques_clpe')

  - name: dim_clpe_ft
    description: >
      Table contenant les infos de clpe sans les codes communes, afin d'avoir une ligne par territoire.

    columns:
      - name: territoire_id
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null
          - unique

  - name: fct_offre_insertion
    description: >
        Table passthrough contenant les métriques offre/demande avec les indicateurs de couverture par type de frein.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('int_offre_insertion')
  - name: fct_logins_utilisateurs_emplois
    description: >
      Table contenant les last logins des utilisateurs des Emplois récuperés via la table utilisateurs_v0, en utilisant un modèle incrémentale.
    columns:
      - name: user_id
        description: "Identifiant de l'utilisateur"
        tests:
          - not_null
      - name: last_login
        description: "Date de dernière connexion"
        tests:
          - not_null
      - name: loaded_at
        description: "Timestamp de chargement"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - 'user_id'
            - 'last_login'
