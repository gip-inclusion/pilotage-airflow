version: 2

models:
  - name: rpt_esat__survey_answers
    config:
      tags:
        - esat
    description: >
      Modèle principal de reporting pour les réponses ESAT.

      Une ligne correspond à un ESAT de la liste officielle.

      Le modèle part du mapping entre ESAT et réponses. Il ajoute ensuite les infos de dim_esat, la commune, le
      département, la région, et les données de la réponse quand une réponse validée existe.

      Les ESAT sans réponse sont gardés. Les ESAT avec une réponse possible mais à vérifier sont gardés aussi,
      mais sans données de réponse associées.

    columns:
      - name: finess_num
        description: >
          Numéro FINESS de l'ESAT dans la liste officielle.
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_esat')
              field: finess_num

      - name: answer_id
        description: >
          Identifiant de la réponse associée à l'ESAT.

          Cette colonne est vide si l'ESAT n'a pas de réponse validée.
        tests:
          - relationships:
              to: ref('fct_esat__survey_answers')
              field: answer_id

      - name: matching_method
        description: >
          Méthode utilisée pour associer l'ESAT à une réponse.
        tests:
          - not_null
          - accepted_values:
              values:
                - manual_mapping
                - direct_finess
                - same_name_and_related_managing_organization
                - related_managing_organization
                - no_answer

      - name: matching_confidence
        description: >
          Niveau de confiance du lien entre l'ESAT et la réponse.

          high veut dire que la réponse est validée.
          low veut dire qu'une réponse possible existe, mais qu'elle doit être vérifiée.
          no_answer veut dire qu'aucune réponse n'a été trouvée.
        tests:
          - not_null
          - accepted_values:
              values:
                - high
                - low
                - no_answer

      - name: esat_name
        description: >
          Nom de l'ESAT dans la liste officielle.

      - name: adresse
        description: >
          Adresse de l'ESAT dans la liste officielle.

      - name: code_postal
        description: >
          Code postal de l'ESAT.

      - name: type_esat
        description: >
          Type de l'établissement.

      - name: siret
        description: >
          Numéro SIRET de l'ESAT dans la liste officielle.

      - name: code_commune_insee
        description: >
          Code INSEE de la commune de l'ESAT.

      - name: nom_commune
        description: >
          Nom de la commune de l'ESAT.

      - name: code_departement_insee
        description: >
          Code INSEE du département de l'ESAT.

      - name: nom_departement
        description: >
          Nom du département de l'ESAT.

      - name: code_region_insee
        description: >
          Code INSEE de la région de l'ESAT.

      - name: nom_region
        description: >
          Nom de la région de l'ESAT.

      - name: capacite_autorisee
        description: >
          Capacité autorisée de l'ESAT dans la liste officielle.

      - name: managing_organization_finess
        description: >
          Numéro FINESS de l'organisme gestionnaire dans la liste officielle.

      - name: answer_finess_num
        description: >
          Numéro FINESS déclaré dans la réponse au questionnaire.

      - name: answer_esat_name
        description: >
          Nom d'ESAT déclaré dans la réponse au questionnaire.

      - name: answer_esat_siret
        description: >
          Numéro SIRET déclaré dans la réponse au questionnaire.

      - name: answer_managing_organization_finess
        description: >
          Numéro FINESS de l'organisme gestionnaire déclaré dans la réponse.


  - name: rpt_esat__low_confidence_potential_answers
    config:
      tags:
        - esat
    description: >
      Réponses possibles pour les ESAT avec un matching de faible confiance.

      Ce modèle sert à aider la vérification manuelle.

      Il ne lit pas fct_esat__survey_answers, car ce modèle contient seulement les
      réponses déjà validées pour l'analyse.

      Une ligne correspond à une réponse possible. Chaque réponse apparaît une seule fois.

    columns:
      - name: answer_id
        description: >
          Identifiant de la réponse possible.
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('int_esat__completed_answers')
              field: answer_id

      - name: code_departement_insee
        description: >
          Code INSEE du département déclaré dans la réponse.

      - name: nom_departement
        description: >
          Nom du département déclaré dans la réponse.

      - name: code_region_insee
        description: >
          Code INSEE de la région déclarée dans la réponse.

      - name: nom_region
        description: >
          Nom de la région déclarée dans la réponse.


  - name: rpt_esat__answer_coverage_by_region
    config:
      tags:
        - esat
    description: >
      Taux de réponse au questionnaire ESAT par région.

      Une ligne correspond à une région.

      Le modèle compte les ESAT avec une réponse validée, les ESAT avec une réponse
      possible à vérifier, et les ESAT sans réponse.

      Le statut vient de matching_confidence dans fct_esat__survey_answers_mapping.

    columns:
      - name: code_region_insee
        description: >
          Code INSEE de la région.
        tests:
          - not_null
          - unique

      - name: nom_region
        description: >
          Nom de la région.
        tests:
          - not_null

      - name: total_esat
        description: >
          Nombre total d'ESAT dans la région.
        tests:
          - not_null

      - name: answered_count
        description: >
          Nombre d'ESAT avec une réponse validée.
        tests:
          - not_null

      - name: pending_count
        description: >
          Nombre d'ESAT avec une réponse possible à vérifier.
        tests:
          - not_null

      - name: no_answer_count
        description: >
          Nombre d'ESAT sans réponse trouvée.
        tests:
          - not_null

      - name: answered_rate
        description: >
          Pourcentage d'ESAT avec une réponse validée.

      - name: pending_rate
        description: >
          Pourcentage d'ESAT avec une réponse possible à vérifier.

      - name: no_answer_rate
        description: >
          Pourcentage d'ESAT sans réponse trouvée.
