    description: >
      Dispositifs de reconnaissance ou de développement des compétences déclarés
      dans les réponses au questionnaire.

      La colonne source peut contenir plusieurs valeurs. Ce modèle crée une ligne
      par réponse et par dispositif.

    columns:
      - name: answer_id
        description: >
          Identifiant de la réponse au questionnaire.
        tests:
