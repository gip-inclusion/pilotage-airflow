version: 2

models:
  - name: esat__answer_software_financial_help
    config:
      tags:
        - esat
    description: >
      Aides financières déclarées dans les réponses au questionnaire.

      La colonne source peut contenir plusieurs valeurs. Ce modèle crée une ligne
      par réponse et par aide financière déclarée.

    columns:
      - name: answer_id
        description: >
          Identifiant de la réponse au questionnaire.
        tests:
          - not_null
          - relationships:
              to: ref('fct_esat__survey_answers')
              field: answer_id

      - name: software_financial_help
        description: >
          Aide financière déclarée pour le carnet de parcours et de compétences,
          ou pour l'achat d'un logiciel.
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - answer_id
            - software_financial_help


  - name: esat__answer_support_themes
    config:
      tags:
        - esat
    description: >
      Thématiques d'accompagnement déclarées dans les réponses au questionnaire.

      La colonne source peut contenir plusieurs valeurs. Ce modèle crée une ligne
      par réponse et par thématique.

    columns:
      - name: answer_id
        description: >
          Identifiant de la réponse au questionnaire.
        tests:
          - not_null
          - relationships:
              to: ref('fct_esat__survey_answers')
              field: answer_id

      - name: support_theme
        description: >
          Thématique d'accompagnement déclarée dans la réponse.
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - answer_id
            - support_theme


  - name: esat__answer_skills_validation_type
