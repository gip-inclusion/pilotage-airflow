  - name: fct_esat__survey_answers_mapping
    config:
      tags:
        - esat
    description: >
      Associe chaque ESAT de dim_esat à une réponse du questionnaire, quand une réponse peut être trouvée.

      Le modèle garde une ligne par ESAT. Il indique si une réponse a été trouvée, comment elle a été trouvée,
      et si le lien est fiable ou à vérifier.

      Les cas avec matching_confidence = low sont gardés pour le suivi, mais ils ne sont pas encore considérés
      comme des réponses valides. C'est pour ça que answer_id reste vide dans ces cas.

    columns:
      - name: finess_num
        description: >
          Numéro FINESS de l'ESAT dans dim_esat.
          C'est la clé du modèle. Il y a une ligne par ESAT.
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_esat')
              field: finess_num

      - name: answer_id
        description: >
          Identifiant de la réponse liée à l'ESAT.

          Cette colonne est remplie seulement quand le lien est fiable. Elle reste vide si aucune réponse n'a
          été trouvée, ou si la réponse possible doit encore être vérifiée.


      - name: matching_method
        description: >
          Méthode utilisée pour trouver la réponse liée à l'ESAT.
        tests:
          - not_null
          - accepted_values:
              values:
                - manual_mapping
                - direct_finess
                - same_name_and_related_managing_organization
                - related_managing_organization
                - no_answer

      - name: matching_confidence
        description: >
          Niveau de confiance du lien entre l'ESAT et la réponse.

          * high signifie que la réponse peut être utilisée.
          * low signifie qu'une réponse possible existe, mais qu'elle doit être vérifiée.
          * no_answer signifie qu'aucune réponse n'a été trouvée.
        tests:
          - not_null
          - accepted_values:
              values:
                - high
                - low
                - no_answer

  - name: fct_esat__survey_answers
    config:
      tags:
        - esat
    description: >
      Réponses du questionnaire ESAT gardées pour l'analyse.

      Le modèle garde les réponses qui ont été reliées à au moins un ESAT de dim_esat.

      Les données de réponse viennent directement du staging du questionnaire. Le mapping sert à choisir quelles
      réponses garder.

      Les informations de déduplication sont ajoutées quand elles existent. Elles peuvent être vides si la réponse
      a été gardée grâce au mapping manuel, mais qu'elle n'a pas été choisie par la déduplication.

      Il y a une ligne par réponse. Si une même réponse est reliée à plusieurs ESAT, elle reste sur une seule ligne.
      Les ESAT liés sont gardés dans mapped_finess_nums.

    columns:
      - name: answer_id
        description: >
          Identifiant de la réponse au questionnaire. C'est la clé du modèle.
          Chaque réponse apparaît une seule fois.
        tests:
          - not_null
          - unique

      - name: finess_num
        description: >
          Numéro FINESS déclaré dans la réponse au questionnaire. Il vient de la réponse
          originale. Il n'est pas remplacé par les FINESS trouvés dans le mapping.

      - name: duplicate_group_finess_nums
        description: >
          Liste des numéros FINESS présents dans le groupe de réponses dédupliquées.

          Cette colonne vient du modèle de déduplication. Elle peut être vide si la réponse a été gardée grâce au
          mapping manuel, mais qu'elle n'a pas été choisie par la déduplication.

      - name: esat_role
        description: >
          Fonction de la personne ayant renseigné le questionnaire dans l'ESAT.

      - name: esat_name
        description: >
          Nom de l'ESAT déclaré dans la réponse.

      - name: duplicate_group_esat_names
        description: >
          Liste des noms d'ESAT présents dans le groupe de réponses dédupliquées.

          Cette colonne vient du modèle de déduplication. Elle peut être vide si la réponse a été gardée grâce au
          mapping manuel, mais qu'elle n'a pas été choisie par la déduplication.
      - name: completeness_score
        description: >
          Nombre de questions renseignées dans la réponse.

          Cette colonne vient du modèle de déduplication. Elle sert surtout à choisir la meilleure réponse quand
          plusieurs réponses semblent être des doublons.

          Elle peut être vide si la réponse a été gardée grâce au mapping manuel, mais qu'elle n'a pas été choisie
          par la déduplication.

      - name: esat_siret
        description: >
          Numéro SIRET de l'ESAT.

      - name: managing_organization_finess
        description: >
          Numéro FINESS de l'entité juridique de rattachement.

      - name: esat_status
        description: >
          Statut de l'ESAT.

      - name: esat_dept
        description: >
          Département d'implantation de l'ESAT.

      - name: nb_places_allowed
        description: >
          Nombre de places autorisées fixé par l'ARS au 31 décembre de l'année n-1.

      - name: nb_employee_worked
        description: >
          Nombre de salariés ou d'agents publics employés dans l'ESAT au 31 décembre
          de l'année n-1.

      - name: nb_employee_shared
        description: >
          Nombre de salariés mutualisés sur plusieurs ESAT au 31 décembre de l'année n-1.

      - name: nb_worker_supported
        description: >
