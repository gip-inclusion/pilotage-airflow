      - name: budget_commercial
        description: >
          Situation du résultat net de la section commerciale.

      - name: budget_commercial_deficit
        description: >
          Montant du déficit de la section commerciale.

      - name: budget_commercial_excedent
        description: >
          Montant de l'excédent de la section commerciale.

      - name: budget_social
        description: >
          Situation du résultat de clôture du budget social.

      - name: budget_social_deficit
        description: >
          Montant du déficit du budget social.

      - name: budget_social_excedent
        description: >
          Montant de l'excédent du budget social.

      - name: budget_accessibility
        description: >
          Montant investi pour la mise aux normes de sécurité et d'accessibilité.

      - name: budget_diversity
        description: >
          Montant investi pour diversifier les activités proposées aux travailleurs.

      - name: comments
        description: >
          Champ libre pour ajouter des précisions ou expliquer certaines réponses.

      - name: mapped_esat_count
        description: >
          Nombre d'ESAT de dim_esat reliés à cette réponse.

        tests:
          - not_null

      - name: mapped_finess_nums
        description: >
          Liste des numéros FINESS des ESAT de dim_esat reliés à cette réponse.

          Cette colonne permet de garder la trace du mapping sans dupliquer la réponse.
        tests:
          - not_null
