version: 2

models:
  - name: atigip_2022
    description: >
      Suivi des prescriptions des SPIP en 2022 pour l'ATIGIP.
  - name: ft_candidats_nord
    description: >
      Contient les informations entrées sur les emplois des candidats du Nord identifiés chez France Travail.
  - name: ft_candidatures_nord
    description: >
      Contient les informations des orientations pour les candidats à l'IAE du nord identifiés par France Travail.
  - name: motif_sortie_contrat_termine
    description: >
      Contient les dates et motifs de sortie pour les candidats à l'IAE. Permet de récupérer les dates de sortie des candidats de l'XP Nord pour permettre à FT de nous fournir la donnée sortie via la DSN.
  - name: fluxIAE_BenefSorties_ASP_v2
    description: >
      Table créée à partir de l'extraction ponctuelle fournie par l'ASP, contenant les données de sorties et bénéficiaires pour les AF.
      Cette table est complétée par d'autres informations que nous recevons du fluxIAE
    tests:
      - dbt_expectations.expect_column_pair_values_to_be_equal:
          column_A: structure_siret_actualise
          column_B: siret_asp

  - name: dim_secteur_activite_naf
    description: >
      Table de dimension contenant les secteurs d’activité issus des divisions de la NAF 2025.
    columns:
        - name: code_secteur_activite
          description: "Identifiant unique du secteur d’activité"
          tests:
            - not_null
            - unique
        - name: secteur_activite
          description: "Intitulé du secteur d’activité. Divisions définies dans le document NAF 2025"
          tests:
            - not_null

  - name: dim_insee_zones_emploi
    description: >
      Table de dimension contenant contenant une vue des zones d'emploi issus de l'INSEE.
    columns:
      - name: code_zone_emploi
        description: "Identifiant unique de la zone d'emploi"
        tests:
        - not_null
        - unique
      - name: zone_emploi
        description: "Intitulé de la zone d'emploi"
        tests:
        - not_null

  - name: fct_sortie_emploi_geographie_nature_contrat
    description: >
      Table de faits contenant les indicateurs de retour à l’emploi après un parcours IAE,
      décomposés par zone d’emploi, nature de contrat et délai après la sortie.
    columns:
      - name: sortie_en_iae
        description: "Trimestre de sortie du parcours IAE."
        tests:
          - not_null

      - name: mois_apres_sortie
        description: "Nombre de mois après la sortie du parcours IAE."
        tests:
          - not_null

      - name: code_zone_emploi
        description: "Code de la zone d’emploi. Foreign Key vers dim_insee_zones_emploi."
        tests:
          - not_null

      - name: nature_contrat
        description: "Nature du contrat: CDI, CDD, etc."
        tests:
          - not_null

      - name: nombre_personnes_en_emploi
        description: "Nombre de personnes en emploi."

      - name: nombre_personnes_sans_emploi
        description: "Nombre de personnes sans emploi."

      - name: taux_personnes_en_emploi
        description: "Taux de personnes en emploi."

  - name: fct_sorties_emploi_geographie_secteur_activite
    description: >
      Table de faits contenant les indicateurs de retour à l’emploi après un parcours IAE,
      décomposés par zone d’emploi, secteur d’activité et délai après la sortie.
    columns:
      - name: sortie_en_iae
        description: "Trimestre de sortie du parcours IAE."
        tests:
          - not_null

      - name: mois_apres_sortie
        description: "Nombre de mois après la sortie du parcours IAE."
        tests:
          - not_null

      - name: code_zone_emploi
        description: "Code de la zone d’emploi. Foreign Key vers dim_insee_zones_emploi."
        tests:
          - not_null

      - name: code_secteur_activite
        description: "Code du secteur d’activité (NAF). Foreign Key vers dim_naf_secteur_activite."
        tests:
          - not_null

      - name: nombre_personnes_en_emploi
        description: "Nombre de personnes en emploi."

      - name: nombre_personnes_sans_emploi
        description: "Nombre de personnes sans emploi."

      - name: taux_personnes_en_emploi
        description: "Taux de personnes en emploi."

