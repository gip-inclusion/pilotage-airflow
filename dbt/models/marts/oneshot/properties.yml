version: 2

models:
  - name: atigip
    description: >
      Suivi des prescriptions des SPIP de la dernière année complète pour l'ATIGIP.
  - name: ft_candidats_nord
    description: >
      Contient les informations entrées sur les emplois des candidats du Nord identifiés chez France Travail.
  - name: ft_candidatures_nord
    description: >
      Contient les informations des orientations pour les candidats à l'IAE du nord identifiés par France Travail.
  - name: motif_sortie_contrat_termine
    description: >
      Contient les dates et motifs de sortie pour les candidats à l'IAE. Permet de récupérer les dates de sortie des candidats de l'XP Nord pour permettre à FT de nous fournir la donnée sortie via la DSN.
  - name: fluxIAE_BenefSorties_ASP_v2
    description: >
      Table créée à partir de l'extraction ponctuelle fournie par l'ASP, contenant les données de sorties et bénéficiaires pour les AF.
      Cette table est complétée par d'autres informations que nous recevons du fluxIAE
    tests:
      - dbt_expectations.expect_column_pair_values_to_be_equal:
          column_A: structure_siret_actualise
          column_B: siret_asp

  - name: dim_secteur_activite_naf
    description: >
      Table de dimension contenant les secteurs d’activité issus des divisions de la NAF 2025.
    columns:
        - name: code_secteur_activite
          description: "Identifiant unique du secteur d’activité"
          tests:
            - not_null
            - unique
        - name: secteur_activite
          description: "Intitulé du secteur d’activité. Divisions définies dans le document NAF 2025"
          tests:
            - not_null

  - name: dim_insee_zones_emploi
    description: >
      Table de dimension contenant contenant une vue des zones d'emploi issus de l'INSEE.
    columns:
      - name: code_zone_emploi
        description: "Identifiant unique de la zone d'emploi"
        tests:
        - not_null
        - unique
      - name: zone_emploi
        description: "Intitulé de la zone d'emploi"
        tests:
        - not_null

  - name: offre_insertion_nombre_freins_de
    description: >
      Table finale reprenant les données agrégées de freins par territoire et dimensions démographiques,
      dépivotées par type de frein. Expose les colonnes de int_nombre_freins_agg pour consommation.

    columns:
      - name: territoire_id
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null

      - name: type_frein
        description: Type de frein à l'insertion
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Numérique'
                - 'Mobilité'
                - 'Lecture/Écriture/Calcul'
                - 'Famille'
                - 'Difficultés Administratives/Juridiques'
                - 'Logement/Hébergement'
                - 'Difficultés Financières'
                - 'Santé'

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - territoire_id
            - beneficiaire_rsa
            - beneficiaire_obligation_emploi
            - resident_zrr
            - resident_qpv
            - sexe
            - tranche_age
            - categorie_demandeurs_emploi
            - diagnostic_effectue
            - type_frein

  - name: offre_insertion_couverture
    description: >
      Table finale permettant d'obtenir l'indice de couverture par type de frein
    columns:
      - name: id_clpe
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null

      - name: type_frein
        description: Type de frein à l'insertion
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Numérique'
                - 'Mobilité'
                - 'Lecture/Écriture/Calcul'
                - 'Famille'
                - 'Difficultés Administratives/Juridiques'
                - 'Logement/Hébergement'
                - 'Difficultés Financières'
                - 'Santé'

      - name: indice_couverture
        description : indicateur de couverture
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
              inclusive: true
