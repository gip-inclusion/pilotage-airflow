version: 2

models:
  - name : contrats
    description: >
     Table avec les informations détaillés sur les contrats. Seulement les contrats avec
     un nombre d'heures travailées supérieure à zéro sont présents.
    columns:
      - name: contrat_id_ctr
        tests:
          - unique
          - not_null
  - name: contrats_cvg_phc
    description: >
      Table créée pour que convergence puisse visualiser le nombre de contrats de type cvg phc par structure et par année.
  - name: contrats_aci
    description: >
      Table contenant tous les contrats en ACI et leur durée. Permettant de comparer les durées et motifs des contrats convergence par rapport aux autres ACI.
  - name: contrats_parent_agregated
    description: >
      Table contenant les infos sur les contrats parents agrégées par structrue, type structure, department, motif_sortie, année_début_contrat et salarie_sortie.
      Cette table permets de faire des analyses sur les contrats parents. Nos avons gardé que les contrats parents ayant un nombre d'heures travailées supérieur à zéro.
    columns:
      - name: contrat_id_structure
        tests:
          - not_null
      - name: type_structure
        tests:
          - not_null
      - name: annee_embauche
        tests:
          - not_null
      - name: salarie_sorti
        tests:
          - not_null
  - name: suivi_etp_realises_v2
    description: >
      Table créée pour suivre le nombre d'etp réalisés. Cette table, permet, à travers le calcul du nombre d'heures x la valeur d'un etp de retrouver le nombre d'etp réalisés par mois et par personne physique.
  - name: suivi_etp_conventionnes_v2
    description: >
      Une ligne par annexe financière (AF) conventionnée entre l'État et une SIAE.
      Contient les ETP conventionnés (État et Conseil Départemental), les montants d'aide annuels
      et les caractéristiques de chaque AF issue des données ASP FluxIAE.

    columns:
      - name: id_annexe_financiere
        description: Identifiant unique de l'annexe financière.

      - name: af_numero_convention
        description: Numéro de la convention pluriannuelle d'objectifs liant l'État à la SIAE (une convention peut regrouper plusieurs AF annuelles).

      - name: af_numero_annexe_financiere
        description: Numéro de l'annexe financière (identifiant ASP de l'AF, distinct du numéro de convention).

      - name: af_date_debut_effet_v2
        description: Date de début d'effet de l'annexe financière.

      - name: af_date_fin_effet_v2
        description: Date de fin d'effet de l'annexe financière.
      - name: af_etat_annexe_financiere_code
        description: État de l'annexe financière côté ASP.

      - name: af_mesure_dispositif_id
        description: Identifiant numérique ASP du dispositif (mesure) associé à l'annexe financière.

      - name: af_mesure_dispositif_code
        description: Code du dispositif ASP. Combine le type de structure et le contexte.

      - name: af_numero_avenant_modification
        description: Numéro d'avenant ou de modification de l'annexe financière.

      - name: effectif_mensuel_conventionné
        description: Nombre d'ETP conventionnés mensuels tels que définis dans l'annexe financière.

      - name: af_montant_total_annuel
        description: Montant total annuel de l'aide conventionnée dans l'AF (en euros).

      - name: af_montant_unitaire_annuel_valeur
        description: Montant unitaire annuel par ETP conventionné (en euros).

      - name: type_structure
        description: Libellé long du type de structure incluant le contexte (droit commun, milieu pénitentiaire, etc.).

      - name: type_structure_emplois
        description: Code court du type de SIAE tel qu'utilisé dans les Emplois de l'inclusion.

      - name: structure_id_siae
        description: Identifiant interne de la SIAE, permet une jointure avec asp.fluxIAE_Structure_v2

      - name: structure_denomination
        description: Dénomination officielle de la SIAE.

      - name: structure_denomination_unique
        description: Dénomination unique de la SIAE (peut inclure le SIRET ou une distinction si plusieurs structures portent le même nom).

      - name: commune_structure
        description: Commune du siège de la SIAE.

      - name: code_insee_structure
        description: Code INSEE de la commune du siège de la SIAE.

      - name: siret_structure
        description: Numéro SIRET de la SIAE (14 chiffres, stocké en bigint).

      - name: nom_departement_structure
        description: Nom du département du siège de la SIAE.

      - name: nom_region_structure
        description: Nom de la région du siège de la SIAE.

      - name: code_departement_af
        description: Code du département rattaché à l'annexe financière (peut différer du département de la structure pour les SIAE à périmètre géographique étendu).

      - name: nom_departement_af
        description: Nom du département rattaché à l'annexe financière.

      - name: nom_region_af
        description: Nom de la région rattachée à l'annexe financière.

      - name: structure_denomination_af
        description: Dénomination de la structure telle qu'enregistrée dans l'annexe financière ASP (peut différer de structure_denomination).

      - name: annee_af
        description: Année de l'annexe financière.

      - name: year_diff
        description: Écart en années entre l'année de l'AF et l'année courante (utilisé pour des calculs de décalage temporel).

      - name: duree_annexe
        description: Durée de l'annexe financière en mois (généralement 12 pour une AF annuelle).

      - name: effectif_annuel_conventionné
        description: Nombre total d'ETP conventionnés sur l'année (effectif_mensuel_conventionné × duree_annexe / 12).

      - name: Montant_total_aide
        description: Montant total de l'aide versée à la SIAE sur la durée de l'annexe financière (en euros).

      - name: part_conventionnement_cd
        description: Part (ratio entre 0 et 1) du conventionnement prise en charge par le Conseil Départemental.

      - name: etp_conventionnes_cd
        description: Nombre d'ETP conventionnés financés par le Conseil Départemental.

      - name: etp_conventionnes_etat
        description: Nombre d'ETP conventionnés financés par l'État.

      - name: af_mt_cofinance
        description: Montant cofinancé par le Conseil Départemental dans le cadre de l'annexe financière (en euros).
  - name: etp_par_salarie
    description: >
      Table créée pour suivre le nombre d'etp réalisés par genre. Cette table permet de suivre les informations à l'échelle de l'id_salarie. Des informations sur les caractéristiques des bénéficiaires sont présentes.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('suivi_etp_realises_v2')
  - name: les_emplois_contrats
    description: >
      Table à destination des emplois afin qu'ils puissent remonter les infos sur les contrats des candidats.
    columns:
      - name: emplois_candidat_id
        tests:
          - not_null
      - name: contrat_id_structure
        tests:
          - not_null
      - name: contrat_mesure_disp_code
        tests:
          - not_null
      - name: contrat_id_ctr
        tests:
          - not_null
          - unique
      - name: contrat_parent_id
        tests:
          - not_null
      - name: contrat_date_embauche
        tests:
          - not_null
      - name: type_contrat
        tests:
          - not_null
  - name: formations
    description: >
      Table permettant de récupérer les formations des salariés à partir du fluxIAE de l'ASP.
      Elle permet d'y ajouter les libellés de l'objectif et du type ainsi que de savoir si le bénéficiaire a travaillé plus
      de zero heure dans le contrat qu'y est associé.
    columns:
      - name: formation_id_for
        description: "Identifiant unique de la formation"
        tests:
          - not_null
          - unique
      - name: formation_id_ctr
        description: "Identifiant du contrat associé à la formation"
        tests:
          - not_null
      - name: formation_objectif_libelle
        description: "Libellé de l'objectif de la formation"
        tests:
          - not_null
      - name: nombre_heures_travail_zero
        description: "Indique si le bénéficiaire a travaillé zero heure dans le contrat associé à la formation"
        tests:
          - not_null
      - name: formation_type_libelle
        description: "Libellé du type de la formation"
        tests:
          - not_null
  - name: suivi_consommation_etp_V2
    description: >
      Table créée pour suivre la consommation réelle d'ETPs par structure ainsi que leur conventionnement.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('suivi_etp_conventionnes_v2')
  - name: suivi_etp_realises_par_structure
    description: >
      Table de suivi des etps réalisés par structure. Cette table permet aussi de suivre si l'état mensuel a été validé.
      L'état mensuel est rempli PAR salarié or cette table est agrégée par structure, le test ci dessous permet de vérifier que l'état mensuel est bien modifié pour tous les salariés en même temps.
      Si pour deux salariés de la même structure on a un état "VALIDE" pour l'un et "BROUILLON" pour l'autre le test renverra une erreur.
      Normalement l'approche métier veut que tous les salariés soient traités en même temps et que l'on ait un statut unique par structure, ce test est là pour éviter une éventuelle erreur côté métier.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('stg_test_suivi_etp_realises_par_structure')
  - name: suivi_etp_realises_par_structure_brsa
    description: >
      Table de suivi des etps réalisés par structure. Cette table permet aussi de savoir combien de salariés sont bRSA ou pas au sein de la structure et quelle a été leur consommation d'ETP.
      Afin d'être en accord avec les règles de la DGEFP et ASP, seuls les salariés ayant travaillé au moins une heure sont pris en compte dans cette table.
  - name: suivi_consommation_mensuelle_etp_V2
    description: >
      Table de suivi des etps réalisés et conventionnés par structure mois par mois.
  - name: sorties_toutes_structures
    description: >
      Table contenant les motifs de sorties pour tous les salariés ayant travaillé dans une SIAE entre l'année N et l'année N-2.
  - name: suivi_complet_etps_conventionnes
    description: >
      Cette table nous permet d'obtenir une vue mensuelle du conventionnement en etp des différentes structures de l'IAE.
      En effet la table suivi_etp_conventionnes_v2 offre uniquement une vue agrégée par structure.
      Grâce à cette table nous pouvons suivre les conventionnements mois par mois de toutes les structures quelle que soit leur durée de conventionnement.
  - name: suivi_realisation_convention_mensuelle
    description: >
      Table de suivi mensuel de la réalisation des conventions SIAE, issue du
      flux ASP. Chaque ligne représente un mois de déclaration pour une annexe
      financière donnée (grain : annexe financière × mois).
      Cette table est la version mensuelle de
      `les_emplois.suivi_realisation_convention_par_structure` : là où cette dernière
      agrège les ETP par annexe, la présente table conserve le détail mois par
      mois, permettant d'analyser la saisonnalité des effectifs et le taux de
      saisie des déclarations mensuelles.
      Une ligne avec `saisie_effectuee = 'Non'` correspond à un mois pour lequel
      la structure n'a pas encore déclaré ses effectifs réels.
      Couvre 2024, 2025 et 2026.
      Jointure naturelle avec `les_emplois.suivi_realisation_convention_par_structure`
      et `asp.fluxIAE_Structure_v2` via `structure_id_siae`.
    columns:
      - name: id_annexe_financiere
        description: >
          Identifiant interne ASP de l'annexe financière. Non unique dans la
          table : une annexe génère autant de lignes que de mois couverts.
          Clé de jointure avec `asp.suivi_realisation_convention_par_structure`.

      - name: af_numero_convention
        description: >
          Numéro de la convention pluriannuelle parente de l'annexe financière.
          Une convention peut comporter plusieurs annexes financières successives.

      - name: af_numero_annexe_financiere
        description: >
          Numéro de référence lisible de l'annexe financière, tel qu'utilisé
          dans les échanges administratifs avec l'ASP.

      - name: af_etat_annexe_financiere_code
        description: >
          État administratif de l'annexe financière au sens financier ASP.
          Valeurs : 'VALIDE' (annexe active et financièrement validée),
          'CLOTURE' (annexe clôturée en fin de période),
          'PROVISOIRE' (annexe en cours de finalisation).

      - name: date_saisie
        description: >
          Date à laquelle la déclaration mensuelle d'effectifs a été saisie
          par la structure dans le système ASP.

      - name: date_validation_declaration
        description: >
          Date de validation de la déclaration mensuelle

      - name: emi_esm_etat_code
        description: >
          Code d'état de la déclaration mensuelle dans le système ASP.
          Valeurs : 'VALIDE' (déclaration validée), 'DEBLOQUE' (débloquée
          après validation), 'SAISI' (saisie en cours), 'BROUILLON' (en cours
          de rédaction).

      - name: af_date_fin_effet_v2
        description: >
          Date de fin d'effet de l'annexe financière (timestamp). Marque la
          fin de la période couverte par la convention.

      - name: annee_af
        description: >
          Année de l'annexe financière (type DOUBLE PRECISION).
          Valeurs : 2024, 2025, 2026.

      - name: duree_annexe
        description: >
          Durée totale de l'annexe financière en mois.


      - name: effectif_mensuel_conventionné
        description: >
          Nombre d'ETP conventionnés pour ce mois spécifique, tel que prévu
          dans l'annexe financière.

      - name: effectif_annuel_conventionné
        description: >
          Nombre total d'ETP conventionnés pour l'année entière de l'annexe
          financière. Identique sur toutes les lignes
          d'une même annexe.

      - name: structure_id_siae
        description: >
          Identifiant de la structure dans le système ASP. Clé étrangère vers
          `asp.fluxIAE_Structure_v2.structure_id_siae` et correspond à
          `id_asp` dans `les_emplois.structures`.

      - name: type_structure
        description: >
          Type détaillé de la structure, combinant le type IAE et le contexte
          d'exercice.
          Valeurs : 'ACI Droit commun', 'EI Droit commun', 'AI Droit commun',
          'ETTI Droit commun', 'EITI Droit commun', 'ACI Milieu pénitentiaire',
          'ACIPA Droit commun', 'EIPA Droit commun', 'EI Milieu pénitentiaire'.

      - name: structure_denomination
        description: >
          Dénomination officielle de la structure telle qu'enregistrée dans
          le système ASP.

      - name: structure_denomination_unique
        description: >
          Dénomination dédupliquée ou normalisée de la structure, utilisée
          pour les affichages et les jointures. Sous le format "nom de la structure - SIRET"

      - name: commune_structure
        description: >
          Nom de la commune de la structure.

      - name: code_insee_structure
        description: >
          Code INSEE de la commune de la structure (5 caractères).

      - name: siret_structure
        description: >
          Numéro SIRET de la structure (type BIGINT).

      - name: nom_departement_structure
        description: >
          Nom du département de la structure.

      - name: nom_region_structure
        description: >
          Nom de la région de la structure.

      - name: code_departement_af
        description: >
          Code INSEE du département de rattachement de l'annexe financière.

      - name: nom_departement_af
        description: >
          Nom du département de rattachement de l'annexe financière.

      - name: nom_region_af
        description: >
          Nom de la région de rattachement de l'annexe financière.

      - name: saisie_effectuee
        description: >
          Indicateur de saisie de la déclaration mensuelle par la structure.
          Valeurs : 'Oui' , 'Non'. Les lignes 'Non' correspondent à des mois futurs
          ou à des retards de saisie.

      - name: effectif_annuel_conventionné_mensualisé
        description: >
          Effectif annuel conventionné ramené au mois, calculé comme
          `effectif_annuel_conventionné / duree_annexe` (type DOUBLE PRECISION).
          Permet de comparer les objectifs mensuels entre structures d'annexes
          de durées différentes.

      - name: nombre_heures_travaillees
        description: >
          Nombre d'heures travaillées déclarées par la structure pour ce mois
          (type NUMERIC). Renseigné uniquement lorsque `saisie_effectuee = 'Oui'`.

      - name: nombre_etp_consommes_reels_annuels
        description: >
          ETP réels consommés sur l'année, calculés à partir des heures
          travaillées déclarées (type DOUBLE PRECISION). Cumulatif depuis le
          début de l'annexe.

      - name: nombre_etp_consommes_reels_mensuels
        description: >
          ETP réels consommés pour ce mois, calculés à partir des heures
          travaillées déclarées (type DOUBLE PRECISION). Valeur nulle lorsque
          `saisie_effectuee = 'Non'`.
  - name: recrutements
    description: >
      Table permettant de suivre les recrutements réalisés et déclarés à l'ASP.
  - name: suivi_realisation_convention_par_structure
    description: >
      Table de suivi de la réalisation des conventions (id annexes financières) par
      structure SIAE, issue du flux ASP. Chaque ligne représente une annexe
      financière associée à une structure pour une année donnée, avec les ETP
      (Équivalents Temps Plein) réalisés comparés aux ETP conventionnés.
      Le delta entre ETP conventionnés et ETP réalisés est l'indicateur central
      du dialogue de gestion entre les SIAE et les DDETS (Directions Départementales
      de l'Emploi, du Travail et des Solidarités).
      Une sous-réalisation (`delta_etp_conventionnes_realises < 0`) signifie que
      la structure n'a pas atteint ses objectifs d'insertion ; une sur-réalisation
      (`> 0`) signifie qu'elle les a dépassés.
      Volumétrie : ~14 100 annexes financières distinctes,
      ~4 600 structures, sur 3 années (2024, 2025, 2026).
      Jointure naturelle avec `asp.fluxIAE_Structure_v2` via `structure_id_siae`.
    columns:
      - name: id_annexe_financiere
        description: >
          Identifiant interne ASP de l'annexe financière.

      - name: af_numero_annexe_financiere
        description: >
          Numéro de référence lisible de l'annexe financière, tel qu'utilisé
          dans les échanges administratifs avec l'ASP.

      - name: emi_esm_etat_code
        description: >
          Code d'état de l'annexe financière dans le système ASP.
          Valeurs : 'VALIDE' (annexe validée et finalisée), 'SAISI' (saisie en
          cours), 'DEBLOQUE' (débloquée après validation), 'BROUILLON' (en cours
          de rédaction).

      - name: annee_af
        description: >
          Année de l'annexe financière (type DOUBLE PRECISION). Couvre l'année actuelle et les deux années précédent celle ci.
      - name: type_structure
        description: >
          Type détaillé de la structure, combinant le type IAE et le contexte
          d'exercice.
          Valeurs : 'ACI Droit commun', 'EI Droit commun', 'AI Droit commun',
          'ETTI Droit commun', 'EITI Droit commun', 'ACI Milieu pénitentiaire',
          'ACIPA Droit commun',
          'EIPA Droit commun',
          'EI Milieu pénitentiaire'.

      - name: structure_denomination
        description: >
          Dénomination officielle de la structure telle qu'enregistrée dans
          le système ASP

      - name: commune_structure
        description: >
          Nom de la commune de la structure.

      - name: code_insee_structure
        description: >
          Code INSEE de la commune de la structure (5 caractères).

      - name: structure_id_siae
        description: >
          Identifiant de la structure dans le système ASP. Clé étrangère vers
          `asp.fluxIAE_Structure_v2.structure_id_siae` et correspond à
          `id_asp` dans `les_emplois.structures`.

      - name: siret_structure
        description: >
          Numéro SIRET de la structure (type BIGINT).

      - name: code_departement_af
        description: >
          Code INSEE du département de rattachement de l'annexe financière
          (ex : '59', '2A', '974').

      - name: nom_departement_af
        description: >
          Nom du département de rattachement de l'annexe financière.

      - name: nom_region_af
        description: >
          Nom de la région de rattachement de l'annexe financière.

      - name: delta_etp_conventionnes_realises
        description: >
          Écart cumulé entre les ETP réalisés et les ETP conventionnés depuis
          le début de la convention (type DOUBLE PRECISION). Une valeur négative
          indique une sous-réalisation (la structure n'a pas atteint ses
          objectifs), une valeur positive une sur-réalisation. Sur les ~19 300
          lignes : ~13 400 sous-réalisations, ~5 500 sur-réalisations,
          ~490 réalisations exactes.

      - name: delta_etp_conventionnes_realises_annuel
        description: >
          Écart annuel entre les ETP réalisés et les ETP conventionnés pour
          l'année de l'annexe financière (type DOUBLE PRECISION). Permet
          de comparer les structures sur une même année civile, sans l'effet
          de cumul pluriannuel.

      - name: somme_etp_realises
        description: >
          Nombre total d'ETP réalisés par la structure depuis le début de la
          convention (valeur cumulée, type DOUBLE PRECISION).

      - name: somme_etp_realises_annuel
        description: >
          Nombre d'ETP réalisés par la structure sur l'année de l'annexe
          financière (valeur annuelle, type DOUBLE PRECISION).
  - name: suivi_visites_tb_prive_semaine
    description: >
      Permet le suivi par semaine des connections des utilisateurs aux tbs prives.
  - name: suivi_visites_tb_prive_mois
    description: >
      Donne la liste des visiteurs de chaque tb prive s'étant connecté sur un mois donné.
  - name: suivi_visites_tb_prive_trimestre
    description: >
      Donne la liste des visiteurs de chaque tb prive s'étant connecté sur un trimestre donné.
  - name: suivi_visites_tous_tb_prive_mensuel
    description: >
      Donne la liste des visiteurs s'étant connecté sur nos tbs privé sur un mois donné (peu importe le tb).
  - name: suivi_visites_tous_tb_prive_trimestre
    description: >
      Donne la liste des visiteurs s'étant connecté sur nos tbs privé sur un trimestre donné (peu importe le tb).
  - name: taux_couverture_semaine
    description: >
      Donne le taux de couverture par semaine et par tb prive.
  - name: taux_couverture_global_mensuel
    description: >
      Donne le taux de couverture par mois, tous tb prive confondus.
  - name: taux_couverture_global_trimestre
    description: >
      Donne le taux de couverture par trimestre, tous tb prive confondus.
  - name: taux_couverture_mensuel
    description: >
      Donne le taux de couverture par mois et par tb prive.
  - name: taux_couverture_trimestre
    description: >
      Donne le taux de couverture par trimestre et par tb prive.
  - name: marche_suivi_structure
    description: >
      Table créée afin que le marché puisse produire des rapports sur les salariées des structures travaillant avec eux.
      Afin de permettre au marché d'être autonome dans l'utilisation de cette table, ci dessous la description des colonnes
    columns:
      - name: identifiant_salarie
        description: identifiant unique du salarie PAR STRUCTURE ce dernier est répertorié dans l'ASP dès qu'un contrat est signé. Un salarié peut signer des contrats dans deux structure différentes sans que nous le sachions car l'identifiant est propre à la structure (et non au flux de l'asp). Les autres colonnes de la table indiquent si le salarié est zrr/qpv/etc. Si un salarié a été en zrr 3 mois puis non zrr 9 mois sur une année, il y aura deux entrées pour ce salarié.
      - name: hash_nir
        description: nir hashé du salarié
      - name: id_annexe_financiere
        description: id unique d'annexe financiere, il y a un ID par année d'annexe. Attention une structure peut avoir deux annexes sur la même année, donc nous pouvons nous retrouver avec deux ID pour la même année. Pour éviter des confusions, il a été décidé de fournir que l'ID d'annexe sans le numéro d'annexe financiere.
      - name: emi_sme_annee
        description: année où le salarie a travaillée dans le structure et donc par extension année de l'annexe;
      - name: emi_sme_mois
        description: mois où le salarié a travaillé dans la structure
      - name: nombre_etp_consommes_reels_annuels
        description: nombre d'ETP annuels réalisés par salarié. Si un salarié a travaillé 0h dans la structure son réalisé sera de 0
      - name: nombre_etp_consommes_reels_mensuels
        description: nombre d'ETP mensuels réalisés par salarié. Si un salarié a travaillé 0h dans la structure son réalisé sera de 0
      - name: effectif_annuel_conventionné
        description: nombre d'ETP annuels conventionnés pour la structure. Attention ici on a les ETPs conventionnés pour toute la structure qui sont répétés pour chaque salarié. Afin d'avoir le bon effectif conventionné il faut soit prendre individuellement une valeur ou faire somme(etp_conventionnés)/identifiant_salarie uniques
      - name: effectif_mensuel_conventionné
        description: nombre d'ETP mensuels réalisés par structure. Attention ici on a les ETPs conventionnés pour toute la structure qui sont répétés pour chaque salarié. Afin d'avoir le bon effectif conventionné il faut soit prendre individuellement une valeur ou faire somme(etp_conventionnés)/identifiant_salarie uniques
      - name: structure_siret_signature
        description: SIRET de la structure à la signature de l'annexe financiere
      - name: structure_siret_actualise
        description: SIRET de la structure actualisé en fonction de l'année et de l'id d'annexe financiere
      - name: structure_denomination
        description: nom de la structure
      - name: contrat_salarie_rqth
        description: Salarie RQTH
      - name: salarie_annee_naissance
        description: Année de naissance salarié
      - name: adresse_qpv
        description: salarie vivant en qpv (oui/non/non renseigné)
      - name: adresse_zrr
        description: salarie vivant en zrr (oui/non/non renseigné)
      - name: genre_salarie
        description: genre salarié (oui/non/non renseigné)
  - name: candidats_decrochage
    description: >
      Table permettant l'identification des candidats en decrochage, c'est a dire les candidats ayant effectué une candidature après une sortie non positive.
  - name: dgefp_etp_etat_cd
    description: >
      Table permettant d'identifier d'associer les données de la DGEFP contenant la part CD et Etat aux informations de structure et d'annexe financiere du flux IAE.
  - name: retention
    description: >
      Table permettant le calcul de la retention à deux mois.
      Définition simpliste : nombre d'utilisateurs qui se sont connectés au moins une fois par mois sur une période de deux mois.
      Permier jet permettant d'aller vers une analyse temporelle plus fine et éventuellement par cas d'usage.
  - name: int_beneficiaires_sorties
    description: >
      Table permettant de récupérer, par annexe financière, les informations de tous les bénéficiaires de l'IAE ainsi que les critères associés à ces derniers. Cette table sera, dans un futur proche, agrémentée des données de sortie.
      Ici on calcule toutes les données de benef afin de compléter les données de l'extraction ASP (données absentes de l'extraction). De plus ces données nous serons utiles dans d'autres tables.
      Une table a été préférée à une vue afin d'optimiser les performances.
  - name: beneficiaires_sorties
    description: >
      Table permettant de récupérer, par annexe financière, les informations de tous les bénéficiaires de l'IAE ainsi que les critères associés à ces derniers. Cette table a été agrémentée des informations de sorties.
      Une partie des données des bénéficiaires et sorties est récupérée à partir de l'extraction fournie par l'ASP.
      Les informations restantes (= données beneficiaires pour l'année en cours + EITI pour toutes les années) proviennent du fluxIAE mis à jour de façon hebdomadaire, où les indicateurs sont calculés par le pilotage, et de l'extraction ponctuelle de l'ASP ou l'ASP a calculé les données.
  - name: accompagnement_freins
    description: >
      Table permettant de suivre les accompagnements proposés en fonction des difficultés des salariés.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('stg_accompagnement_freins')
    columns:
      - name: acc_id
        description: >
          Identifiant unique de l'accompagnement
        tests:
          - not_null
      - name: acc_afi_id
        description: >
          Identifiant unique de l'annexe financière auquel l'accompagnement est rattaché
        tests:
          - not_null
      - name: annee_creation_accompagnement
        description: >
          Année de création de l'accompagnement comme déclaré dans fluxIAE_Accompagnement
        tests:
          - not_null
      - name: type_frein
        description: >
          Type de difficulté rencontré par le salarié
        tests:
          - not_null
      - name: acc_nb_sal_conc
        description: >
          Nombre de salariés concerné par le type de frein
        tests:
          - not_null
      - name: acc_nb_sal_int
        description: >
          Nombre de salariés ayant bénéficié d'un accompagnement en interne pour ce type de frein
        tests:
          - not_null
      - name: acc_nb_sal_ext
        description: >
          Nombre de salariés ayant bénéficié d'un accompagnement externe pour ce type de frein
        tests:
          - not_null
      - name: acc_nb_sal_int_ext
        description: >
          Nombre de salariés ayant bénéficié d'un accompagnement interne et externe pour ce type de frein
        tests:
          - not_null
      - name: acc_nb_sal_acc
        description: >
          Nombre de salariés ayant bénéficié d'un accompagnement pour ce type de frein
        tests:
          - not_null
      - name: ratio_salaries_accompagnes
        description: >
          Ratio de salariés ayant bénéficié d'un accompagnement pour ce type de frein
        tests:
          - not_null
      - name: ratio_int_vs_acc
        description: >
          Ratio de salariés ayant bénéficié d'un accompagnement interne par rapport au nombre total de salariés ayant bénéficié d'un accompagnement pour ce type de frein
        tests:
          - not_null
      - name: ratio_ext_vs_acc
        description: >
          Ratio de salariés ayant bénéficié d'un accompagnement externe par rapport au nombre total de salariés ayant bénéficié d'un accompagnement pour ce type de frein
        tests:
          - not_null
      - name: ratio_int_ext_vs_acc
        description: >
          Ratio de salariés ayant bénéficié d'un accompagnement interne et externe par rapport au nombre total de salariés ayant bénéficié d'un accompagnement pour ce type de frein
        tests:
          - not_null
  - name: accompagnement_pro
    description: >
      Table permettant de suivre les accompagnements professionels proposés par les structures
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('stg_accompagnement_pro')
  - name: caracteristiques_beneficiaires
    description: >
      Table permettant d'obtenir les caractéristiques des bénéficiaires par id d'annexe financière. Cette table reprend et reproduit les calculs fait par l'ASP.
      La seule différence se trouve sur les tranches d'âge car nous n'avons pas la date de naissance exacte mais uniquement les années de naissance.
      Nous ne pouvons avoir qu'un contrat par af_id, nous utilisons donc la concaténation entre les deux comme clé primaire.
    columns:
      - name: id_af_contrat
        tests:
          - unique
