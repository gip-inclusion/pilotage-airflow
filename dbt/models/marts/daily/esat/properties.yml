version: 2

models:
  - name: esat__software_financial_help_by_finess
    description: >
        Modèle de type mart permettant d’exploser les valeurs de la colonne software_financial_help afin d’obtenir une ligne par établissement (finess_num) et par type d’aide financière.

        La colonne source contient une liste de valeurs sous forme de texte. Ce modèle transforme cette liste en plusieurs lignes, facilitant ainsi
        l’analyse des dispositifs mobilisés par les ESAT.

    columns:
        - name: finess_num
          description: >
            Numéro FINESS de l’établissement principal.

          tests:
            - not_null

        - name: software_financial_help
          description: >
            Type(s) d’aide financière mobilisée(s) par l’ESAT pour financer la mise en place du carnet de parcours et de compétences ou l’acquisition d’un logiciel.

            Cette variable est issue d’une question à choix multiples. Elle peut contenir plusieurs modalités sélectionnées par un même établissement (exemples : crédits non reconductibles, FATESAT,
            fonds CCAH, AGGIRC-ARCO)

          tests:
            - not_null

    tests:
        - dbt_utils.unique_combination_of_columns:
            combination_of_columns:
                - finess_num
                - software_financial_help


  - name: esat__support_themes_by_finess
    description: >
        Modèle de type mart permettant d’exploser les valeurs de la colonne support_themes afin d’obtenir une ligne par établissement (finess_num) et par thématique principale d’accompagnement
        médico-social.

        La colonne source contient une liste de modalités sélectionnées dans une question à choix multiples du questionnaire. Ce modèle transforme cette liste en plusieurs lignes pour faciliter l’analyse
        des thématiques d’accompagnement déclarées par les ESAT.

    columns:
        - name: finess_num
          description: >
            Numéro FINESS de l’établissement principal.
          tests:
            - not_null

        - name: support_theme
          description: >
            Thématique principale d’accompagnement médico-social déclarée par l’ESAT dans le questionnaire.

            Exemples de valeurs : [WORKSHOP_JOB_SEARCH, WORKSHOP_WELLBEING, PROFESSIONAL_SUPPORT, CPF_OPENED, COMPANY_TOUR, OTHER.]
          tests:
            - not_null

    tests:
        - dbt_utils.unique_combination_of_columns:
            combination_of_columns:
                - finess_num
                - support_theme

  - name: esat__skills_validation_type_by_finess
    description: >
        Modèle de type mart permettant d’exploser les valeurs de la colonne skills_validation_type afin d’obtenir une ligne par établissement (finess_num) et par type de dispositif mobilisé pour
        reconnaître et développer les compétences des travailleurs et travailleuses.

        La colonne source contient une liste de modalités sélectionnées dans une question à choix multiples du questionnaire. Ce modèle transforme cette liste en plusieurs lignes pour faciliter l’analyse
        des dispositifs déclarés par les ESAT.

    columns:
        - name: finess_num
          description: >
            Numéro FINESS de l’établissement principal.
          tests:
            - not_null

        - name: skills_validation_type
          description: >
            Type de dispositif mobilisé par l’ESAT pour reconnaître et développer les compétences des travailleurs et travailleuses.

            Exemples de valeurs : RAE, RSFP, VAE, AFEST, OTHER, NONE.
          tests:
            - not_null

    tests:
        - dbt_utils.unique_combination_of_columns:
            combination_of_columns:
                - finess_num
                - skills_validation_type

  - name: esat__retirement_preparation_actions_by_finess
    description: >
        Modèle de type mart permettant d’exploser les valeurs de la colonne retirement_preparation_actions afin d’obtenir une ligne par établissement (finess_num) et par action mise en œuvre pour
        préparer les travailleurs et travailleuses au départ à la retraite.

        La colonne source contient une liste de modalités sélectionnées dans une question à choix multiples du questionnaire. Ce modèle transforme cette liste en plusieurs lignes pour faciliter l’analyse
        des actions déclarées par les ESAT.

    columns:
        - name: finess_num
          description: >
            Numéro FINESS de l’établissement principal.
          tests:
            - not_null

        - name: retirement_preparation_action
          description: >
            Action déclarée par l’ESAT pour préparer les travailleurs et travailleuses au départ à la retraite.

            Exemples de valeurs : ADMINISTRATIVE_ASSISTANCE, UAAT, WORKING_HOURS_REDUCTION_AND_ORGANISATION, PSYCHOLOGICAL_AND_SOCIAL_ASSISTANCE.
          tests:
            - not_null

    tests:
        - dbt_utils.unique_combination_of_columns:
            combination_of_columns:
                - finess_num
                - retirement_preparation_action

  - name: esat__documents_falclist_by_finess
    description: >
        Modèle de type mart permettant d’exploser les valeurs de la colonne documents_falclist afin d’obtenir une ligne par établissement (finess_num) et par type de document rendu accessible en FALC ou
        en communication alternative augmentée.

        La colonne source contient une liste de modalités sélectionnées dans une question à choix multiples du questionnaire. Ce modèle transforme cette liste en plusieurs lignes pour faciliter l’analyse
        des documents accessibles déclarés par les ESAT.

    columns:
        - name: finess_num
          description: >
            Numéro FINESS de l’établissement principal.
          tests:
            - not_null

        - name: document_falclist_item
          description: >
            Type de document déclaré comme accessible en FALC ou en communication alternative augmentée. Exemples de valeurs : CONTRACT, BOOKLET, REGULATION.
          tests:
            - not_null

    tests:
        - dbt_utils.unique_combination_of_columns:
            combination_of_columns:
                - finess_num
                - document_falclist_item

  - name: esat__insertion_staff_funding_by_finess
    description: >
        Modèle de type mart permettant d’exploser les valeurs de la colonne insertion_staff_funding afin d’obtenir une ligne par établissement (finess_num) et par mode de financement des conseillers en
        parcours d’insertion ou assimilés.

        La colonne source contient une liste de modalités sélectionnées dans une question à choix multiples du questionnaire. Ce modèle transforme cette liste en plusieurs lignes pour faciliter l’analyse
        des modes de financement déclarés par les ESAT.

    columns:
        - name: finess_num
          description: >
            Numéro FINESS de l’établissement principal.
          tests:
            - not_null

        - name: insertion_staff_funding_item
          description: >
            Mode de financement déclaré pour les conseillers en parcours d’insertion ou assimilés. Exemples de valeurs : BPAS, BAPC, OTHER.
          tests:
            - not_null

    tests:
        - dbt_utils.unique_combination_of_columns:
            combination_of_columns:
                - finess_num
                - insertion_staff_funding_item

  - name: mart_esat__core
    description: >
        Réponses au questionnaire 2025 relatif au Plan de Transformation des ESAT, transmises par les établissements dans le cadre de leur obligation réglementaire de reporting aux ARS.

        Ce modèle constitue la table principale d’analyse. Il conserve une ligne par établissement (clé : finess_num) et regroupe l’ensemble des variables déclaratives à valeur unique portant sur l’activité
        de l’ESAT, les travailleurs accompagnés, les dispositifs mobilisés et plusieurs indicateurs liés au Réseau pour l’Emploi.

        Les variables multivaluées ont été exclues de ce modèle et normalisées dans des modèles dédiés (marts thématiques), afin de faciliter les analyses et les jointures.

        https://pilotage.inclusion.beta.gouv.fr/survey/esat-2025/019d9049-9290-7cb1-bf6b-fbcdc9c8fe4b/introduction

    columns:
        - name: answer_id
          description: >
                Identifiant technique de la réponse au questionnaire. Une seule réponse est conservée par établissement après déduplication.
          tests:
            - not_null
            - unique

        - name: finess_num
          description: >
                Numéro FINESS de l’établissement principal. Clé principale du modèle, utilisée pour les jointures avec les autres marts.
          tests:
            - unique
            - not_null

        - name: esat_role
          description: >
            Fonction de la personne ayant renseigné le questionnaire au sein de l’ESAT.

        - name: esat_name
          description: >
            Nom de l’ESAT.

        - name: esat_siret
          description: >
            Numéro SIRET de l’ESAT.

        - name: managing_organization_finess
          description: >
            Numéro FINESS de l’entité juridique de rattachement.

        - name: esat_status
          description: >
            Statut de l’ESAT.

        - name: esat_dept
          description: >
            Département d’implantation de l’ESAT.

        - name: nb_places_allowed
          description: >
            Nombre de places autorisées fixé par l’ARS au 31 décembre de l’année n-1.

        - name: nb_employee_worked
          description: >
            Nombre de salariés ou d’agents publics employés dans l’ESAT au 31 décembre
            de l’année n-1.

        - name: nb_employee_shared
          description: >
            Nombre de salariés mutualisés sur plusieurs ESAT parmi les effectifs
            au 31 décembre de l’année n-1.

        - name: nb_worker_supported
          description: >
            Nombre de travailleurs et travailleuses accompagnés en année n-1.

        - name: nb_worker_half_time
          description: >
            Nombre de travailleurs et travailleuses à temps partiel en année n-1.

        - name: mean_worker_age
          description: >
            Âge moyen des travailleurs et travailleuses accompagnés au 31 décembre
            de l’année n-1.

        - name: mean_seniority
          description: >
            Ancienneté moyenne des travailleurs et travailleuses accompagnés au
            31 décembre de l’année n-1.

        - name: nb_worker_previous_mot
          description: >
            Nombre de travailleurs ayant occupé antérieurement un emploi en milieu
            ordinaire, y compris en entreprise adaptée, avant leur admission à l’ESAT.

        - name: nb_worker_new
          description: >
            Nombre de travailleurs et travailleuses admis pour la première fois
            en milieu protégé de travail.

        - name: nb_worker_temporary
          description: >
            Nombre de travailleurs et travailleuses admis temporairement dans l’ESAT.

        - name: nb_worker_mispe_mdph
          description: >
            Nombre de personnes accompagnées par l’ESAT dans le cadre d’une mise
            en situation professionnelle prescrite par une MDPH.

        - name: nb_worker_mispe_rpe
          description: >
            Nombre de personnes accompagnées par l’ESAT dans le cadre d’une mise
            en situation professionnelle prescrite par le Réseau pour l’Emploi.

        - name: nb_worker_willing_mot
          description: >
            Nombre de travailleurs ayant exprimé dans leur projet personnalisé
            leur volonté d’aller travailler en milieu ordinaire.

        - name: nb_worker_ft_job_seekers
          description: >
            Nombre de travailleurs et travailleuses inscrits comme demandeurs
            d’emploi à France Travail.

        - name: has_prescription_delegate
          description: >
            Indique si l’ESAT est délégataire de prescription de PMSMP.

        - name: is_pmsmp_refused
          description: >
            Indique si l’ESAT a eu des refus de PMSMP de la part des organismes
            du Réseau pour l’Emploi.

        - name: nb_worker_pmsmp
          description: >
            Nombre de travailleurs et travailleuses ayant effectué une PMSMP.

        - name: nb_worker_service
          description: >
            Nombre de travailleurs et travailleuses ayant réalisé une prestation
            de service auprès d’une entreprise, d’une collectivité publique ou
            d’un autre organisme.

        - name: nb_worker_mad_indiv
          description: >
            Nombre de travailleurs et travailleuses ayant réalisé une mise à
            disposition individuelle ou collective chez un employeur public ou privé.

        - name: nb_worker_with_public
          description: >
            Nombre de travailleurs et travailleuses ayant réalisé une activité
            dans un lieu au contact de la clientèle.

        - name: nb_worker_only_inside
          description: >
            Nombre de travailleurs et travailleuses étant restés travailler dans
            les murs sans contact avec le public ou le milieu ordinaire.

        - name: nb_worker_cumul_esat_ea
          description: >
            Nombre de travailleurs et travailleuses ayant cumulé un temps partiel
            dans l’ESAT et un emploi à temps partiel en entreprise adaptée.

        - name: nb_worker_cumul_esat_mot
          description: >
            Nombre de travailleurs et travailleuses ayant cumulé un temps partiel
            dans l’ESAT et un emploi à temps partiel en milieu ordinaire.

        - name: nb_worker_left
          description: >
            Nombre de travailleurs et travailleuses ayant quitté l’ESAT en année n-1.

        - name: nb_worker_left_ea
          description: >
            Nombre de travailleurs ayant quitté l’ESAT pour un emploi en entreprise adaptée.

        - name: nb_worker_left_private
          description: >
            Nombre de travailleurs ayant quitté l’ESAT pour un emploi dans le milieu
            ordinaire privé lucratif.

        - name: nb_worker_left_public
          description: >
            Nombre de travailleurs ayant quitté l’ESAT pour un emploi dans le milieu
            ordinaire public.

        - name: nb_worker_left_asso
          description: >
            Nombre de travailleurs ayant quitté l’ESAT pour un emploi dans le milieu
            ordinaire privé non lucratif.

        - name: nb_worker_left_other_reason
          description: >
            Nombre de travailleurs ayant quitté l’ESAT pour d’autres raisons.

        - name: nb_worker_cdi
          description: >
            Nombre de travailleurs ayant signé un CDI parmi ceux ayant quitté l’ESAT
            pour un autre emploi.

        - name: nb_worker_cdd
          description: >
            Nombre de travailleurs ayant signé un CDD.

        - name: nb_worker_interim
          description: >
            Nombre de travailleurs en mission d’intérim.

        - name: nb_worker_prof
          description: >
            Nombre de travailleurs en contrat de professionnalisation.

        - name: nb_worker_apprentice
          description: >
            Nombre de travailleurs en contrat d’apprentissage.

        - name: nb_conv_exit_agreement
          description: >
            Nombre de conventions d’appui en vigueur au 31 décembre de l’année n-1
            avec un employeur public ou privé pour accompagner la sortie vers le
            milieu ordinaire.

        - name: nb_conv_exit_agreement_new
          description: >
            Nombre de conventions d’appui signées en année n-1 avec un employeur
            public ou privé pour accompagner la sortie vers le milieu ordinaire.

        - name: nb_worker_esrp
          description: >
            Nombre de travailleurs et travailleuses ayant suivi une formation en
            établissement ou service de réadaptation professionnelle.

        - name: nb_worker_reinteg
          description: >
            Nombre de travailleurs et travailleuses ayant réintégré l’ESAT.

        - name: nb_worker_reinteg_other
          description: >
            Nombre de travailleurs et travailleuses ayant intégré un autre ESAT.

        - name: nb_esat_agreement
          description: >
            Nombre d’ESAT avec lesquels une convention a été établie pour garantir
            l’exercice du droit au retour.

        - name: nb_support_hours
          description: >
            Catégorie correspondant au nombre moyen d’heures de soutien liées à
            l’activité professionnelle dont chaque travailleur a bénéficié en année n-1.

        - name: support_themes
          description: >
            Thématiques principales d’accompagnement médico-social proposées par
            l’ESAT. Cette colonne peut contenir plusieurs valeurs.

        - name: has_contrib_opco
          description: >
            Indique si l’ESAT a acquitté une contribution pour la formation des
            travailleurs et travailleuses auprès de l’OPCO Santé ou de l’ANFH.

        - name: pct_opco
          description: >
            Taux de contribution à l’OPCO Santé ou à l’ANFH.

        - name: nb_worker_formation_opco
          description: >
            Nombre de travailleurs et travailleuses ayant suivi une formation prise
            en charge par l’OPCO Santé ou par l’ANFH en année n-1.

        - name: has_opco_or_anfh_refusal
          description: >
            Indique si l’ESAT a fait l’objet d’un ou plusieurs refus de financement
            d’une formation par l’OPCO Santé ou l’ANFH.

        - name: nb_worker_cpf_used
          description: >
            Nombre de travailleurs et travailleuses ayant utilisé leur CPF au
            31 décembre de l’année n-1, depuis leur admission dans l’ESAT.
            Le nom source de la colonne était trompeur.

        - name: cpf_unused_reason
          description: >
            Raisons pour lesquelles les travailleurs et travailleuses n’utilisent
            pas leur CPF.

        - name: formation_cpf
          description: >
            Formation majoritairement suivie par les travailleurs et travailleuses
            au titre de leur CPF.

        - name: nb_worker_intern_formation
          description: >
            Nombre de travailleurs et travailleuses ayant bénéficié d’au moins une
            formation animée en interne par les salarié(e)s de l’ESAT.

        - name: formation_subject
          description: >
            Sujets des formations dispensées en interne par l’ESAT.

        - name: has_autodetermination_formation
          description: >
            Indique si une formation à l’autodétermination a été mise en place pour
            les travailleurs et travailleuses.

        - name: nb_worker_autodetermination
          description: >
            Nombre de travailleurs et travailleuses ayant bénéficié d’une formation
            à l’autodétermination dans l’année.

        - name: has_autodetermination_external_formation
          description: >
            Indique si la formation à l’autodétermination est assurée par l’intermédiaire
            d’un organisme externe.

        - name: skills_validation_type
          description: >
            Types de dispositifs dont ont bénéficié les travailleurs et travailleuses
            pour reconnaître et développer leurs compétences.

        - name: nb_worker_rae_rsfp
          description: >
            Nombre de travailleurs et travailleuses ayant bénéficié d’une RAE ou d’une RSFP.

        - name: nb_worker_vae
          description: >
            Nombre de travailleurs et travailleuses ayant bénéficié d’une VAE.

        - name: after_skills_validation
          description: >
            Nombre de travailleurs sortis dans l’année ayant obtenu auparavant une
            validation ou une reconnaissance de leurs compétences.

        - name: nb_worker_duoday
          description: >
            Nombre de travailleurs et travailleuses de l’ESAT ayant participé à Duoday
            en année n-1.

        - name: nb_employee_reverse_duoday
          description: >
            Nombre de professionnels du milieu ordinaire ayant participé à des Duoday
            inversés en année n-1.

        - name: skills_notebook
          description: >
            Indique si un carnet de parcours et de compétences a été mis en place.

        - name: software_financial_help
          description: >
            Indique si l’ESAT a bénéficié d’une aide financière pour mettre en place
            le carnet de parcours et de compétences et, le cas échéant, acquérir un logiciel.

        - name: software_financial_help_type
          description: >
            Type d’aide financière reçue pour la mise en place du carnet de parcours
            et de compétences.

        - name: retirement_preparation_actions
          description: >
            Actions conduites par l’ESAT pour préparer les travailleurs et travailleuses
            au départ à la retraite.

        - name: uaat_inscription
          description: >
            Indique si l’ESAT est inscrit dans la démarche Un Avenir Après le Travail.

        - name: retirement_preparation_nb_workers
          description: >
            Nombre de travailleurs et travailleuses ayant bénéficié d’actions de
            préparation à la retraite.

        - name: pct_more_than50
          description: >
            Nombre de travailleurs et travailleuses de plus de 50 ans ayant travaillé
            dans l’ESAT en année n-1.

        - name: documents_falclist
          description: >
            Indique si les principaux documents destinés aux travailleurs et travailleuses
            étaient accessibles en FALC ou en CAA au 31 décembre de l’année n-1.

        - name: has_worker_delegate
          description: >
            Indique s’il existe dans l’ESAT un ou une délégué(e) des travailleurs élu(e).

        - name: worker_delegate_formation
          description: >
            Indique si le ou la délégué(e) des travailleurs a bénéficié d’une formation
            au cours de son mandat pour cette mission.

        - name: worker_delegate_hours_credit
          description: >
            Indique si le ou la délégué(e) des travailleurs a bénéficié d’un crédit
            d’heures chaque mois pour remplir sa mission.

        - name: has_delegate_hours
          description: >
            Indique si un nombre d’heures a été précisé pour le crédit d’heures
            du ou de la délégué(e) des travailleurs.

        - name: has_mix_qvt_in_place
          description: >
            Indique si une instance mixte sur la qualité de vie au travail, l’hygiène
            et la sécurité était en place en année n-1.

        - name: profit_sharing_bonus
          description: >
            Montant moyen de la prime d’intéressement versée aux travailleurs et
            travailleuses en année n-1.

        - name: mean_pct_esat_rem
          description: >
            Pourcentage moyen de rémunération directe des travailleurs pris en charge
            par l’ESAT au 31 décembre de l’année n-1.

        - name: has_foresight_in_place
          description: >
            Indique si l’ESAT a contribué en année n-1 à un régime de prévoyance
            avec compensation partielle de la rémunération garantie.

        - name: year_foresight_in_place
          description: >
            Année de mise en œuvre du régime de prévoyance dans l’ESAT.

        - name: annual_transport_budget
          description: >
            Budget annuel alloué au transport des travailleurs et travailleuses de
            leur domicile à l’ESAT.

        - name: nb_worker_transport
          description: >
            Nombre de travailleurs et travailleuses ayant bénéficié d’un transport
            financé ou organisé par l’ESAT.

        - name: nb_worker_mobility_inclusion_card
          description: >
            Nombre de travailleurs et travailleuses ayant bénéficié de la carte
            mobilité inclusion.

        - name: nb_worker_driving_licence
          description: >
            Nombre de travailleurs et travailleuses titulaires du permis de conduire.

        - name: nb_worker_code
          description: >
            Nombre de travailleurs et travailleuses ayant obtenu le code de la route.

        - name: has_holiday_voucher
          description: >
            Indique si l’ESAT propose des chèques vacances aux travailleurs et travailleuses.

        - name: holiday_voucher_annual_budget
          description: >
            Budget annuel de l’ESAT consacré aux chèques vacances.

        - name: has_gift_voucher
          description: >
            Indique si l’ESAT propose des chèques cadeaux aux travailleurs et travailleuses.

        - name: gift_voucher_annual_budget
          description: >
            Budget annuel de l’ESAT consacré aux chèques cadeaux.

        - name: nb_worker_worked_sunday
          description: >
            Nombre de travailleurs et travailleuses ayant travaillé au moins un dimanche
            ou un jour férié en année n-1.

        - name: has_agreement_signed_ft
          description: >
            Indique si une convention était en vigueur en année n-1 avec les acteurs
            du Réseau pour l’Emploi.

        - name: has_agreement_signed_ea
          description: >
            Indique si une convention était en vigueur en année n-1 avec une entreprise adaptée.

        - name: has_agreement_signed_dept_pae
          description: >
            Indique si une convention était en vigueur en année n-1 avec la plateforme
            emploi accompagné du département.

        - name: nb_insertion_staff
          description: >
            Nombre de conseillers en parcours d’insertion ou assimilés dans les effectifs
            au 31 décembre de l’année n-1.

        - name: nb_insertion_dispo
          description: >
            Nombre de postes de conseillers en parcours d’insertion ou assimilés mis
            à disposition ou mutualisés au 31 décembre de l’année n-1.

        - name: insertion_staff_funding
          description: >
            Mode de financement des conseillers en parcours d’insertion ou assimilés.

        - name: annual_ca
          description: >
            Chiffre d’affaires annuel commercial total, toutes activités confondues.

        - name: annual_ca_production
          description: >
            Chiffre d’affaires annuel commercial issu des productions propres.

        - name: annual_ca_service
          description: >
            Chiffre d’affaires annuel commercial issu des prestations de service.

        - name: annual_ca_mad
          description: >
            Montant annuel du chiffre d’affaires issu exclusivement des contrats de
            mise à disposition.

        - name: pct_ca_public
          description: >
            Pourcentage du chiffre d’affaires réalisé avec des clients du secteur public.

        - name: budget_commercial
          description: >
            Situation du résultat net de la section commerciale.

        - name: budget_commercial_deficit
          description: >
            Montant du déficit de la section commerciale.

        - name: budget_commercial_excedent
          description: >
            Montant de l’excédent de la section commerciale.

        - name: budget_social
          description: >
            Situation du résultat de clôture du budget de fonctionnement, section
            d’exploitation du budget social.

        - name: budget_social_deficit
          description: >
            Montant du déficit du budget social.

        - name: budget_social_excedent
          description: >
            Montant de l’excédent du budget social.

        - name: budget_accessibility
          description: >
            Montant des investissements réalisés pour la mise aux normes de sécurité
            et d’accessibilité des installations.

        - name: budget_diversity
          description: >
            Montant des investissements réalisés pour diversifier les activités proposées
            aux travailleurs et travailleuses.

        - name: comments
          description: >
            Champ libre permettant d’apporter des précisions complémentaires ou de
            signaler des questions auxquelles l’ESAT n’a pas pu répondre.
