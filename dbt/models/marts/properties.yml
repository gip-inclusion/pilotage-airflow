version: 2

models:
  - name: data_inclusion__structures_sans_dedupliquer
    description: >
      La table reprend les données de l'API Data Inclusion sans dédupliquer les structures.

      Par défaut, on préfère utiliser la table `dim_data_inclusion__structures`, car elle prend en compte les doublons. En revanche,
      pour certaines demandes métier où l'on nous demande de fournir toutes les structures Data Inclusion, ligne par ligne, sans tenir
      compte du fait qu'elles soient ou non des doublons, on utilise ce modèle.

      Le seul ajout fait par rapport à la donnée brute est l'ajout du `structure_id` des structures dédupliquées, afin de pouvoir
      identifier, si besoin, le groupe de doublons auquel chaque structure appartient.


    config:
        tags:
            - data-inclusion
    columns:
      - name: source_structure_id
        description: >
          Identifiant original de la structure dans sa source. Provenant directement de l'API Data Inclusion.
        tests:
          - not_null
          - unique

      - name: structure_id
        description: >
          Identifiant unique de la structure Data Inclusion dédupliquée. Géneré dans `int_data_inclusion__structure_source_mapping`
        tests:
          - not_null

      - name: nom
        description: >
          Nom de la structure.

      - name: description
        description: >
          Description de la structure.

      - name: lien_source
        description: >
          Lien vers la fiche de la structure dans la source conservée.

      - name: date_maj
        description: >
          Date de dernière mise à jour de la structure dans la source conservée.

      - name: siret
        description: >
          Numéro SIRET de la structure, lorsqu'il est disponible.

      - name: code_commune_insee
        description: >
          Code INSEE de la commune de la structure. Il permet de faire le lien avec `dim_commune`.

      - name: code_postal
        description: >
          Code postal de la structure.

      - name: adresse
        description: >
          Adresse de la structure.

      - name: complement_adresse
        description: >
          Complément d'adresse de la structure.

      - name: longitude
        description: >
          Longitude de la structure.

      - name: latitude
        description: >
          Latitude de la structure.

      - name: telephone
        description: >
          Numéro de téléphone de la structure.

      - name: courriel
        description: >
          Adresse email de contact de la structure.

      - name: site_web
        description: >
          Site web de la structure.

      - name: horaires_accueil
        description: >
          Horaires d'accueil de la structure.

      - name: accessibilite_lieu
        description: >
          Informations sur l'accessibilité du lieu.

      - name: reseaux_porteurs
        description: >
          Réseaux porteurs associés à la structure.

      - name: adresse_certifiee
        description: >
          Indique si l'adresse de la structure est certifiée dans Data Inclusion.

      - name: score_qualite
        description: >
          Score de qualité de la fiche structure dans Data Inclusion.

