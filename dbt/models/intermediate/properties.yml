version: 2

models:
  - name: int_origine_derniere_candidature_par_candidat
    description: >
      Table contenant les origines et la date de la dernière candidature émise par chaque candidat. Cela nous donne une information sur l'éventuel dernier accompagnement reçu.
    columns:
      - name: hash_nir
        tests:
          - not_null
          - unique
      - name: date_derniere_candidature
        tests:
          - not_null
      - name: id_org_prescripteur
      - name: nom_org_prescripteur
      - name: origine_detaillee
      - name: origine
  - name: int_metiers_derniere_candidature_fdp_par_candidat
    description: >
      Table contenant les codes romes associés à la dernière fiche de poste auquel le candidat a candidaté.
      Cela ne corresponds pas forcement à la dernière candidature parce que on peut avoir des candidatures spontanées (i.e. non associés à une fiche de poste.)
      Un fiche de poste peut avoir plusiers code romes associés.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - 'hash_nir'
            - 'code_rome_fdp'
  - name : int_thematiques_clpe
    description: >
     Table permettant de sommer le nombre de thematiques (tous services confondus) et de les agréger par clpe. Ainsi nous aurons une vue territoriale (partielle) sur l'offre proposée

    columns:
      - name: territoire_id
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null
          - unique

  - name: int_nombre_freins_par_groupe
    description: >
      Enrichissement de la table staging France Travail avec le nombre total de freins déclarés
      et le nombre de demandeurs d'emploi ayant au moins un frein, par groupe démographique.

    columns:
      - name: total_freins_declares
        description: Nombre total de contraintes actives (issu de n_nbcontraintesactives, 0 si null)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: demandeurs_emploi_avec_freins
        description: Nombre de demandeurs d'emploi ayant au moins un frein déclaré
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

  - name: int_nombre_freins_agg
    description: >
      Agrégation des freins par territoire et dimensions démographiques, puis dépivotage
      en lignes par type de frein (unpivot via CROSS JOIN LATERAL).
      Chaque ligne représente un type de frein pour une combinaison territoire/public donnée.

    columns:
      - name: territoire_id
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null

      - name: type_frein
        description: Type de frein à l'insertion
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Numérique'
                - 'Mobilité'
                - 'Lecture/Écriture/Calcul'
                - 'Famille'
                - 'Difficultés Administratives/Juridiques'
                - 'Logement/Hébergement'
                - 'Difficultés Financières'
                - 'Santé'

      - name: nbr_freins_declares
        description: Nombre de demandeurs d'emploi déclarant ce type de frein
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - territoire_id
            - beneficiaire_rsa
            - beneficiaire_obligation_emploi
            - resident_zrr
            - resident_qpv
            - sexe
            - tranche_age
            - categorie_demandeurs_emploi
            - diagnostic_effectue
            - type_frein

  - name: int_metriques_offre_insertion
    description: >
      Calcul des métriques intermédiaires pour l'analyse offre/demande par territoire (CLPE).
      Croise les freins France Travail avec les thématiques Data Inclusion pour calculer
      les parts de besoin et d'offre par type de frein.

    columns:
      - name: id_clpe
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null
          - unique

  - name: int_offre_insertion
    description: >
      Enrichissement des métriques offre/demande avec les indicateurs de couverture par type de frein.
      Formule couverture : offre / (besoin + offre).

  - name: int_communes_base
    description: >
      Cette table part du staging des communes et corrige certaines incohérences de la source. En particulier,
      les codes région et département peuvent être absents pour certaines communes associées ou déléguées (COMA,
      COMD). Dans ces cas, ils sont complétés à partir de la commune parente.
      Le grain reste identique à celui du staging (une ligne par enregistrement source), sans déduplication à ce
      stade.

    columns:
      - name: code_commune_insee
        description: "Code commune INSEE"
        tests:
          - not_null

      - name: type_commune
        description: "Type de commune (COM, COMD, COMA, ARM)"

      - name: type_commune_label
        description: "Type de commune en clair"

      - name: code_region_insee
        description: >
          Code région.
          Complété à partir de la commune parente si absent dans la source.
        tests:
          - not_null

      - name: code_departement_insee
        description: >
          Code département.
          Complété à partir de la commune parente si absent dans la source.
        tests:
          - not_null

      - name: code_arrondissement_insee
        description: "Code arrondissement"

      - name: libelle
        description: "Nom en clair (typographie riche) avec article"
        tests:
          - not_null

      - name: code_commune_parente
        description: >
          Code de la commune parente.
          Utilisé pour compléter les informations géographiques manquantes.

      - name: has_parent_commune
        description: "Indique si la commune possède une commune parente"

      - name: same_code_as_parent
        description: >
          Indique si la commune partage le même code INSEE que sa commune parente.
          Cas fréquent pour certaines communes déléguées.

      - name: is_arrondissement_municipal
        description: "Indique si la commune est un arrondissement municipal (Paris, Lyon, Marseille)"

      - name: region_or_departement_filled_from_parent
        description: >
          Indique si le code région ou département a été complété à partir de la commune parente

      - name: parent_libelle
        description: "Libellé de la commune parente (utilisé principalement pour debug)"

  - name: int_communes_code_postal
    description: >
      Modèle intermédiaire qui agrège les codes postaux au niveau de la commune.Ce modèle est construit
      à partir de la table de correspondance entre communes et codes postaux et retourne une seule ligne
      par code_commune_insee.
      Il fournit un code postal principal ainsi que le nombre total de codes postaux associés à chaque
      commune.

    columns:
      - name: code_commune_insee
        description: "Code commune INSEE"
        tests:
          - not_null
          - unique

      - name: code_postal_principal
        description: >
          Code postal principal de la commune.
          Il correspond au plus petit code postal observé pour cette commune. Peut être nul si aucun code
          postal n'est disponible.

      - name: nb_codes_postaux
        description: >
          Nombre de codes postaux distincts associés à la commune.
