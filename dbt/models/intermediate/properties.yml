version: 2

models:
  - name: int_origine_derniere_candidature_par_candidat
    description: >
      Table contenant les origines et la date de la dernière candidature émise par chaque candidat. Cela nous donne une information sur l'éventuel dernier accompagnement reçu.
    columns:
      - name: hash_nir
        tests:
          - not_null
          - unique
      - name: date_derniere_candidature
        tests:
          - not_null
      - name: id_org_prescripteur
      - name: nom_org_prescripteur
      - name: origine_detaillee
      - name: origine
  - name: int_metiers_derniere_candidature_fdp_par_candidat
    description: >
      Table contenant les codes romes associés à la dernière fiche de poste auquel le candidat a candidaté.
      Cela ne corresponds pas forcement à la dernière candidature parce que on peut avoir des candidatures spontanées (i.e. non associés à une fiche de poste.)
      Un fiche de poste peut avoir plusiers code romes associés.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - 'hash_nir'
            - 'code_rome_fdp'
  - name : int_thematiques_clpe
    description: >
     Table permettant de sommer le nombre de thematiques (tous services confondus) et de les agréger par clpe. Ainsi nous aurons une vue territoriale (partielle) sur l'offre proposée

    columns:
      - name: territoire_id
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null
          - unique

  - name: int_nombre_freins_par_groupe
    description: >
      Enrichissement de la table staging France Travail avec le nombre total de freins déclarés
      et le nombre de demandeurs d'emploi ayant au moins un frein, par groupe démographique.

    columns:
      - name: total_freins_declares
        description: Nombre total de contraintes actives (issu de n_nbcontraintesactives, 0 si null)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: demandeurs_emploi_avec_freins
        description: Nombre de demandeurs d'emploi ayant au moins un frein déclaré
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

  - name: int_nombre_freins_agg
    description: >
      Agrégation des freins par territoire et dimensions démographiques, puis dépivotage
      en lignes par type de frein (unpivot via CROSS JOIN LATERAL).
      Chaque ligne représente un type de frein pour une combinaison territoire/public donnée.

    columns:
      - name: territoire_id
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null

      - name: type_frein
        description: Type de frein à l'insertion
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Numérique'
                - 'Mobilité'
                - 'Lecture/Écriture/Calcul'
                - 'Famille'
                - 'Difficultés Administratives/Juridiques'
                - 'Logement/Hébergement'
                - 'Difficultés Financières'
                - 'Santé'

      - name: nbr_freins_declares
        description: Nombre de demandeurs d'emploi déclarant ce type de frein
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - territoire_id
            - beneficiaire_rsa
            - beneficiaire_obligation_emploi
            - resident_zrr
            - resident_qpv
            - sexe
            - tranche_age
            - categorie_demandeurs_emploi
            - diagnostic_effectue
            - type_frein

  - name: int_metriques_offre_insertion
    description: >
      Calcul des métriques intermédiaires pour l'analyse offre/demande par territoire (CLPE).
      Croise les freins France Travail avec les thématiques Data Inclusion pour calculer
      les parts de besoin et d'offre par type de frein.

    columns:
      - name: id_clpe
        description: Identifiant unique du territoire (CLPE)
        tests:
          - not_null
          - unique

  - name: int_offre_insertion
    description: >
      Enrichissement des métriques offre/demande avec les indicateurs de couverture par type de frein.
      Formule couverture : offre / (besoin + offre).

  - name: int_esat__surveys_esat_answers_deduplicated
    description: >
      Modèle intermédiaire de déduplication des réponses au questionnaire ESAT 2025.
      Lorsqu’un même établissement identifié par finess_num a transmis plusieurs
      réponses, ce modèle conserve uniquement la réponse la plus complète.

      La complétude est mesurée en comptant le nombre de colonnes renseignées,
      hors identifiants techniques answer_id et finess_num.

      En cas d’égalité, la réponse conservée est celle ayant le `answer_id` le
      plus élevé.

    columns:
      - name: finess_num
        description: >
          Numéro FINESS de l’établissement principal.
        tests:
          - unique
          - not_null

      - name: completeness_score
        description: >
          Nombre de colonnes renseignées dans la réponse, hors `answer_id` et
          `finess_num`. Une valeur élevée indique une réponse plus complète.
