              arguments:
                values: ['Oui', 'Non']

      - name: indirect_enabled
        description: Indique si le bloc indirect est activé pour cette prestation.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Oui', 'Non']

      - name: direct_beneficiaires
        description: Nombre de bénéficiaires en prestation directe avec ORP CDAPH.

      - name: direct_discontinue_personnes

      - name: direct_presentiel_total
        description: Nombre total de personnes accompagnées en présentiel.

      - name: direct_presentiel_complet
        description: Nombre de personnes accompagnées en présentiel complet.

      - name: direct_presentiel_partiel
        description: Nombre de personnes accompagnées en présentiel partiel.

      - name: direct_hybride_total
        description: Nombre total de personnes accompagnées en hybride.

      - name: direct_hybride_complet
        description: Nombre de personnes accompagnées en hybride complet.

      - name: direct_hybride_partiel
        description: Nombre de personnes accompagnées en hybride partiel.

      - name: direct_distanciel_total
        description: Nombre total de personnes accompagnées à distance.

      - name: direct_distanciel_complet
        description: Nombre de personnes accompagnées à distance complet.

      - name: direct_distanciel_partiel
        description: Nombre de personnes accompagnées à distance partiel.

      - name: direct_hors_murs_personnes
        description: Nombre de personnes accompagnées hors les murs.

      - name: direct_hors_murs_journees
        description: Nombre de journées d'accompagnement hors les murs.

      - name: direct_hebergees_personnes
