      - name: preco_formation_alternance
        description: Nombre de préconisations vers une formation en alternance.

      - name: preco_formation_esrp_dfa
        description: Nombre de préconisations vers une formation ESRP ou DFA.

      - name: preco_espo_specialisee_ueros
