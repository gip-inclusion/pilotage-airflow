version: 2

models:
  - name: int_fagerh__prestations
    description: Une ligne par réponse et par prestation renseignée dans le JSON des prestations.
    columns:
      - name: uuid
        description: Identifiant unique de la réponse du questionnaire.
        data_tests:
          - not_null

      - name: prestation_key
        description: Clé technique de la prestation dans le JSON.
        data_tests:
          - not_null

      - name: prestation_done
        description: Indique si la prestation a été renseignée jusqu'au bout.
        data_tests:
          - not_null

      - name: visited_blocks
        description: Blocs visités dans le formulaire pour cette prestation.

      - name: nb_files_active
        description: Nombre de personnes présentes à l'effectif au 31/12 ayant signé un contrat de séjour.

      - name: preaccueil_sans_suite
        description: Nombre de personnes reçues en pré-accueil sans suite dans l'année.

      - name: sorties_avant_terme
        description: Nombre de sorties définitives avant le terme de la prestation.

      - name: sorties_terme
        description: Nombre de sorties au terme de la prestation.

      - name: sorties
        description: Nombre de sorties définitives en 2025.

      - name: journees
        description: Nombre de journées réalisées.

      - name: journees_theoriques
        description: Nombre de journées théoriques.

      - name: json_coh_genre
        description: Répartition par genre, conservée au format JSON.

      - name: json_coh_age
        description: Répartition par âge, conservée au format JSON.

      - name: json_coh_niveau_formation_entree
        description: Répartition par niveau de formation à l'entrée, conservée au format JSON.

      - name: json_coh_situation_entree
        description: Répartition par situation à l'entrée, conservée au format JSON.

      - name: json_coh_ressources_entree
        description: Répartition par ressources à l'entrée, conservée au format JSON.

      - name: json_coh_pathologies
        description: Répartition par nombre de pathologies, conservée au format JSON.

      - name: json_coh_origine_handicap
        description: Répartition par origine du handicap, conservée au format JSON.

      - name: json_coh_lesion_origine
        description: Répartition par origine de lésion, conservée au format JSON.

      - name: json_geo_rows
        description: Répartition géographique de la prestation, conservée au format JSON.

      - name: json_handicap_matrix
