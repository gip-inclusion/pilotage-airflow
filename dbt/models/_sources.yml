version: 2

sources:
  - name: fluxIAE
    schema: public
    # TODO(vperron): One day this should be in a DAG.
    description: >
      Tables générées chaque semaine, manuellement, par un script lancé par un développeur des Emplois
      de l'Inclusion. Ces données sont des exports venant de certains fichiers transmis par l'ASP et
      sont utiles pour en dériver de nombreuses autres données (calculs ETP par exemple)
    tables:
      - name: fluxIAE_AnnexeFinanciere
      - name: fluxIAE_ContratMission
      - name: fluxIAE_EtatMensuelIndiv
      - name: fluxIAE_Missions
      - name: fluxIAE_MissionsEtatMensuelIndiv
      - name: fluxIAE_RefCategorieSort
      - name: fluxIAE_RefMontantIae
      - name: fluxIAE_RefMotifSort
      - name: fluxIAE_RefNiveauFormation
      - name: fluxIAE_RefFormeContrat
      - name: fluxIAE_Salarie
      - name: fluxIAE_Structure
      - name: fluxIAE_MarchesPublics
      - name: fluxIAE_Accompagnement
      - name: fluxIAE_BenefSorties_ASP
        description: >
          Table générée par l'ASP et fournie via un partage de mail.
          Cette dernière contient les données de bénéficiaires et sorties, calculées par l'ASP, pour les années 2022, 2023 et 2024
      - name: fluxIAE_Formations
      - name: fluxIAE_RefObjectifFormation
      - name: fluxIAE_RefTypeFormation
      - name: fluxIAE_RefDureePoleEmploi

  - name: emplois
    schema: public
    description: >
      Tables générées chaque nuit par les Emplois de l'Inclusion à partir de leur base de données.
    tables:
      - name: c1_analytics_v0
        description: >
          Table agrégeant des compteurs de données analytiques et datées (fiches de poste, etc) pouvant être réutilisées
          dans différents indicateurs.
      - name: c1_private_dashboard_visits_v0
        description: >
          Propose une ligne par visite enregistrée sur un tableau de bord privé du Pilotage de l'Inclusion.
      - name: c1_ref_motif_suspension
      - name: candidats_v0
      - name: candidatures
      - name: cap_campagnes
      - name: cap_candidatures
      - name: cap_critères_iae
      - name: cap_structures
      - name: codes_rome
      - name: collaborations
      - name: communes  # Cities
      - name: critères_iae
      - name: departements
      - name: fiches_de_poste
      - name: fiches_de_poste_par_candidature
        description: >
            Table de liaison entre les candidatures et les fiches de poste.
            Résout la relation many-to-many : une candidature peut être associée à
            plusieurs fiches de poste, et une fiche de poste peut recevoir plusieurs
            candidatures.
            À joindre avec `les_emplois.candidatures_echelle_locale` (sur `id`) et
            `les_emplois.fiches_de_poste` (sur `id`) pour enrichir les candidatures avec
            le métier, le type de contrat ou le domaine professionnel visé.
        columns:
          - name: id_fiche_de_poste
            description: >
              Identifiant de la fiche de poste. Clé étrangère vers
              `les_emplois.fiches_de_poste.id`
          - name: id_candidature
            description: >
              Identifiant de la candidature. Clé étrangère vers
              `les_emplois.candidatures_echelle_locale.id` (type UUID).
          - name: date_mise_à_jour_metabase
            description: >
              Date de la dernière synchronisation de cette ligne dans Metabase.
              Mise à jour quotidienne.
      - name: institutions
      - name: organisations_v0
      - name: pass_agréments
        description: >
          Table de l'ensemble des PASS IAE et agréments délivrés depuis la création
          de la plateforme Emplois de l'Inclusion. Chaque ligne représente un PASS IAE
          ou un agrément Pôle emploi historique associant un candidat à une structure
          employeuse pour une période donnée.
          Le PASS IAE est le titre d'accès à l'IAE, valable 2 ans, renouvelable par
          prolongation (`les_emplois.prolongations`). Un même candidat peut avoir plusieurs
          PASS successifs dans cette table.
          Mise à jour : quotidienne.
        columns:
          - name: id
            description: >
              Identifiant unique du PASS IAE ou agrément (entier). Clé primaire de
              la table. Référencé dans `les_emplois.prolongations.id_pass_agrément`.

          - name: type
            description: >
              Type de titre d'accès à l'IAE.
              Valeurs : 'PASS IAE (99999)' (titre natif de la plateforme, délivré
              depuis 2021), 'Agrément PE via ITOU (non 99999)' (ancien agrément
              Pôle emploi importé dans la plateforme, antérieur à la bascule PASS IAE).

          - name: date_début
            description: >
              Date de début de validité du PASS IAE. Correspond généralement à la
              date d'embauche effective du candidat.

          - name: date_fin
            description: >
              Date de fin de validité du PASS IAE. Calculée à 2 ans après
              `date_début`, prolongée si des prolongations ont été accordées.
              La valeur '2040-01-01' est utilisée comme sentinelle pour les PASS
              sans date de fin définie.

          - name: durée
            description: >
              Durée de validité du PASS IAE (type PostgreSQL INTERVAL), calculée
              entre `date_début` et `date_fin`.

          - name: id_candidat
            description: >
              Identifiant du candidat titulaire du PASS IAE. Clé étrangère vers
              `les_emplois.candidats.id`.

          - name: id_structure
            description: >
              Identifiant de la structure employeuse ayant déclenché le PASS IAE.
              Clé étrangère vers `les_emplois.structures.id`.

          - name: type_structure
            description: >
              Type de la structure employeuse associée au PASS IAE.
              Valeurs : 'ACI', 'AI', 'ETTI', 'EI', 'EITI', 'GEIQ', 'OPCS', 'EA',
              'EATT'. Il ne faut pas considérer les PASS hors SIAE ('ACI', 'AI', 'ETTI', 'EI', 'EITI')

          - name: siret_structure
            description: >
              Numéro SIRET de la structure employeuse au moment de la délivrance
              du PASS IAE.

          - name: nom_structure
            description: >
              Nom de la structure employeuse au moment de la délivrance du PASS IAE.

          - name: département_structure_ou_org_pe
            description: >
              Code INSEE du département de la structure employeuse, ou de
              l'organisation Pôle emploi pour les agréments historiques
              (type 'Agrément PE via ITOU').

          - name: nom_département_structure_ou_org_pe
            description: >
              Nom du département de la structure employeuse ou de l'organisation
              Pôle emploi pour les agréments historiques.

          - name: région_structure_ou_org_pe
            description: >
              Nom de la région de la structure employeuse ou de l'organisation
              Pôle emploi pour les agréments historiques.

          - name: injection_ai
            description: >
              Indicateur technique de PASS issu de la reprise de stock AI
              (Associations Intermédiaires).
              (1 = PASS injecté depuis l'historique AI, 0 = PASS natif).
              Filtrer sur `injection_ai = 0` pour les analyses de flux courant.

          - name: hash_numéro_pass_iae
            description: >
              Numéro du PASS IAE anonymisé par hachage. Permet de référencer un
              PASS sans exposer son numéro réel.

          - name: date_mise_à_jour_metabase
            description: >
              Date de la dernière synchronisation de cette ligne dans Metabase.
              Mise à jour quotidienne.
      - name: structures
      - name: suspensions_v0
      - name: utilisateurs_v0
      - name: demandes_de_prolongation
      - name: prolongations
        description: >
          Table des prolongations de PASS IAE accordées sur la plateforme Emplois de
          l'Inclusion. Une prolongation étend la durée de validité d'un PASS IAE
          au-delà de ses 2 ans initiaux, pour permettre à un salarié en insertion de
          poursuivre son parcours.
          Chaque ligne représente une prolongation accordée, liée à un PASS IAE et
          à la structure déclarante. Certains motifs (depuis le 26 juillet 2023)
          nécessitent une validation par un prescripteur habilité avant d'être
          accordés ; d'autres sont validés directement par la SIAE.
          Les 20 137 lignes sans `id_demande_de_prolongation` correspondent
          aux prolongations antérieures au dispositif de demande formalisée (avant
          juillet 2023). Mise à jour : quotidienne.
          À compléter avec `les_emplois.suivi_demandes_prolongations` pour accéder aux
          champs de workflow (état, délai de traitement, motif de refus).
        columns:
          - name: id
            description: >
              Identifiant unique de la prolongation (entier). Clé primaire de la table.

          - name: id_pass_agrément
            description: >
              Identifiant du PASS IAE prolongé. Clé étrangère vers
              `les_emplois.pass_agréments.id`. Un même PASS peut faire l'objet de
              plusieurs prolongations successives.

          - name: date_début
            description: >
              Date de début de la période de prolongation. Correspond généralement
              à la date d'expiration du PASS IAE initial ou de la prolongation
              précédente.

          - name: date_fin
            description: >
              Date de fin de la période de prolongation. La valeur '2040-01-01'
              est utilisée comme sentinelle pour les prolongations à durée
              indéterminée.

          - name: motif
            description: >
              Motif justifiant la prolongation du PASS IAE.
              Valeurs nécessitant une validation par un prescripteur habilité
              (depuis le 26 juillet 2023) :
              '50 ans et plus',
              'RQTH - Reconnaissance de la qualité de travailleur handicapé',
              'Difficultés particulièrement importantes dont l''absence de prise en
              charge ferait obstacle à son insertion professionnelle'.
              Valeurs validées directement par la SIAE :
              'Fin d''une formation',
              'CDI conclu avec une personne de plus de 57 ans',
              'Contexte sanitaire'.

          - name: id_utilisateur_déclarant
            description: >
              Identifiant de l'utilisateur (membre de la structure) ayant déclaré
              la prolongation sur la plateforme.

          - name: id_structure_déclarante
            description: >
              Identifiant de la structure employeuse ayant déclaré la prolongation.
              Clé étrangère vers `les_emplois.structures.id`.

          - name: id_organisation_prescripteur
            description: >
              Identifiant de l'organisation prescriptrice ayant validé la demande
              de prolongation. Clé étrangère vers `les_emplois.organisations.id`.
              Null pour les prolongations à validation directe SIAE
              et pour les prolongations antérieures à juillet 2023.

          - name: id_utilisateur_prescripteur
            description: >
              Identifiant de l'utilisateur prescripteur ayant traité la demande
              de prolongation. Null si aucun prescripteur impliqué.

          - name: date_de_création
            description: >
              Date de création de la prolongation dans le système. Permet de distinguer
              les prolongations avant (< 2023-07-26) et après la réforme du dispositif
              de demande formalisée.

          - name: id_demande_de_prolongation
            description: >
              Identifiant de la demande de prolongation associée. Clé étrangère vers
              `les_emplois.suivi_demandes_prolongations.id`. Null pour les ~20 100
              prolongations créées avant la mise en place du workflow de demande
              (avant juillet 2023).

          - name: date_mise_à_jour_metabase
            description: >
              Date de la dernière synchronisation de cette ligne dans Metabase.
              Mise à jour quotidienne.
      - name: structures_v0
      - name: c1_ref_type_contrat
        description: >
          Table de correspondance entre le code d'un type de contrat et son label affiché sur les emplois.
      - name: c1_ref_type_prescripteur
      - name: c1_ref_motif_de_refus
        description: >
          Table de correspondance entre le code d'un motif de refus et son label affiché sur les emplois.
          Sert de base pour la table motif de refus qui contient le label affiché sur le pilotage.

  - name: france_travail
    schema: france_travail
    description: >
      Nombre et % de demandeurs par catégories x caractéristiques, % par activités (Rome, Compétence), par territoire.
    tables:
     - name: job_seeker_stats
       description: >
         Table qui stocke des statistiques sur les chercheurs d'emploi du API France Travail. Les statistiques sont organisées
         par territoire, characteristique, activité et période, selon le schema du API.
     - name: data_diag_ft
       description: >
         Table obtenue suite à une extraction csv fournie par France Travail. Cette table contient des informations de diagnostic des demandeurs d'emploi.
         Ce sont des données agrégées, c'est à dire qu'une ligne peut concerner plusieurs demandeurs d'emplois.
       columns:
        - name: mois_statistique
          description: mois et année de l'extraction
        - name: c_territoire_id
          description: id CLPE associé aux DE
        - name: c_lblterritoire
          description: Libellé du CLPE associé aux DE
        - name: dptres
          description: Numéro de département associé aux DE
        - name: regres
          description: Numéro de région associé aux DE
        - name: categorie_statistique
          description: Catégorie des DE
        - name: tranche_anciennete
          description: Ancienneté des DE
        - name: top_qpv
          description: QPV True/False
        - name: top_zrr
          description: ZRR True/False
        - name: top_boe
          description: beneficiaire de l'obligation d'emploi (BOE) True/False
        - name: top_rsa
          description: bRSA True/False
        - name: tranche_age
          description: Tranche d'age des DE
        - name: niveau_de_formation
          description: Niveau de formation des DE
        - name: sexe
          description: Sexe des DE
        - name: situation_de_famille
          description: Situation familiale des DE
        - name: nombre_enfants_a_charge
          description: Nombre d'enfants à charge des DE
        - name: structure_accompagnement
          description: Structude d'accompagnement des DE - que des null à date du 28/01/2026
        - name: parcours_accompagnement
          description: Type de parcours d'accomapgnement des DE (emploi; social, socio-pro)
        - name: defm
          description: Nombre de demandeurs d'emplois pour la ligne concernée.
        - name: contrainte_numerique
          description: Frein True/False
        - name: c_impactcontrainte_numeriq_id
          description: Intensité du frein, YYYY = non renseigné
        - name: contrainte_mobilite
          description: Frein True/False
        - name: c_impactcontrainte_mobilite_id
          description: Intensité du frein, YYYY = non renseigné
        - name: contrainte_familiale
          description: Frein True/False
        - name: c_impactcontrainte_famille_id
          description: Intensité du frein, YYYY = non renseigné
        - name: contrainte_sante
          description: Frein True/False
        - name: c_impactcontrainte_sante_id
          description: Intensité du frein, YYYY = non renseigné
        - name: contrainte_savoir
          description: Frein True/False
        - name: c_impactcontrainte_savoir_id
          description: Intensité du frein, YYYY = non renseigné
        - name: contrainte_logement
          description: Frein True/False
        - name: c_impactcontrainte_logement_id
          description: Intensité du frein, YYYY = non renseigné
        - name: contrainte_financiere
          description: Frein True/False
        - name: c_impactcontrainte_finance_id
          description: Intensité du frein, YYYY = non renseigné
        - name: contrainte_admin_jurid
          description: Frein True/False
        - name: contrainte_admin_jurid
          description: Intensité du frein, YYYY = non renseigné
        - name: n_nbcontraintesactives
          description: somme du nombre de contraintes diagnostiquées
        - name: diag
          description: diagnostic effectuée OUI/NON

  - name: oneshot
    schema: public
    description: >
      Tables gérées soit manuellement, soit mises à jour de manière très peu fréquente (DAG annuel, ou données FT par exemple)
    tables:
      - name: reseau_iae_adherents
        description: >
          Table très utilisée et source de nombreuses autres données. Les réseaux IAE (Coorace, Cocagne, ...)
          nous fournissent des listes de SIAE adhérentes qui sont regroupées ici.

          Cette source est gérée manuellement via une feuille de calcul partagée nommée "reseau_iae_adherents".
          Un DAG est lancé tous les mois (ou manuellement) pour régénérer notre table depuis cette feuille de calcul.

          Les fichiers XLSX d'origine sont stockés dans notre bucket Clever Cloud `c2-private-sources`.

      - name: suivi_complet_etps_conventionnes  # TODO(ypassa): Un autre script airflow à contribuer
      - name: suivi_satisfaction  # TODO(ypasse): Documenter cette source. Eventuellement réécrire son script sous forme de DAG.

      - name: FT_donnees_brutes
        description: >
          Table contenant les données brutes de l'expérimentation FT. Mise à jour manuellement, via lancement d'un DAG, environ tous les 15j.
      - name: ft_iae_nord
        description: >
          Table créée via le dag ft_expe_nord qui télécharge les données de l'expérimentation sur un drive.
          Contient 13 600 demandeurs d’emploi du Nord auxquels un pass IAE a été attribué entre le 1 janvier 2021 et le 30 juin 2023.
  - name: matomo
    schema: public
    tables:
      - name: suivi_visiteurs_tb_publics_v1
        # FIXME(vperron): One day this should be in a DAG.
        description: >
          Table générée par une tâche périodique côté Les Emplois de l'Inclusion et qui permet de remonter les
          visites sur les tableaux de bord publics du Pilotage.
  - name: monrecap
    schema: monrecap
    description: >
      Données de Mon Récap
    tables:
      - name: Contacts_v0
      - name: Commandes_v0
      - name: contacts_non_commandeurs_v0
      - name: raw_barometre
  - name: DGEFP
    schema: public
    description: >
      Tables générées chaque semaine, manuellement via un DAG, après récupération des données auprès de la DGEFP
    tables:
      - name: dgefp_donnees_etp
  - name: esat
    schema: esat
    description: >
      Réponses aux questionnaires co-construite avec les ARS à destination des ESAT.
      Données importées de Tally (et bientôt des emplois).
    tables:
      - name: raw_questionnaire_2025
  - name: esat_raw
    schema: raw
    tables:
      - name: surveys_esatanswer
        description: >
            Réponses au Questionnaire relatif au Plan de Transformation des ESAT 2025.
            https://pilotage.inclusion.beta.gouv.fr/survey/esat-2025/019d9049-9290-7cb1-bf6b-fbcdc9c8fe4b/introduction
  - name: data_inclusion
    schema: data_inclusion
    description: >
      Données de data inclusion récupérées via leur API. xxx_v0 fait référence aux données de la v0 de l'API; xxx_v1 fait référence aux données de la v1 de l'API.
      Les données v0 ne sont plus mises à jour depuis mi-octobre 2025
    tables:
      - name: structures_v0
      - name: services_v0
      - name: structures_v1_with_soliguide
      - name: services_v1_with_soliguide
  - name: gps
    schema: public
    description: >
      Tables GPS créées par les emplois.
    tables:
      - name: gps_log_data
        description: >
          Table permettant de suivre les actions des membres de GPS sur le sites des emplois.
      - name: gps_groups_v1
        description: >
          Table permettant d'identifier des groupes GPS sur le sites des emplois.
      - name: gps_membres_v1
        description: >
          Table permettant d'identifier les membres de GPS sur le sites des emplois.

  - name: dsn
    schema: raw_dsn
    description: >
        Tables contenant des données DSN brutes. Elles sont générées par la CNAV après notre
        dépôt du fichier d’appel sur le SFTP de dépôt.

    tables:
        - name: dsn_geographie_et_nature_contrat
        - name: dsn_geographie_et_secteur_activite
        - name: dsn_geographie_et_sexe
        - name: dsn_type_siae_et_geographie
        - name: dsn_type_siae_et_nature_contrat
        - name: dsn_type_siae_et_secteur_activite
        - name: dsn_type_siae_et_sexe

  - name: dora
    schema: raw_dora
    description: >
      Schéma contenant les tables sources issues de la prod de DORA, ainsi que les tables contenant les structures et services data inclusion (di_services et di_structures).
      Seules les champs ambigus ou pertinents pour les transformations sont documentés ci-dessous.
    tables:
      - name: orientations_orientation
        description: >
          Liste des orientations.
          Une orientation (id) correspond à l'envoi d'un formulaire de la part d'un precripteur (prescriber_id).
          Un formulaire étant la recommandation d'un service (service_id) à un tiers (beneficiary).
        columns:
        - name: prescriber_id
          description: >
            Identifiant du prescripteur de cette orientation, correspondant à la clé primaire de la table user.
        - name: prescriber_structure_id
          description: >
            Identifiant de la structure du prescripteur, correspondant à la clé primaire de la table structure.
        - name: service_id
          description: >
            Identifiant du service orienté au bénéficiaire, correspondant à la clé primaire de la table service.
        - name: creation_date
          description: >
            Date d'envoi de l'orientation.
        - name: processing_date
          description: >
            Date de prise en compte de l'orientation.
            Vide lorsque l'orientation est encore ouverte ou que la modération a été rejetée (sauf quelques cas particuliers à la marge).
        - name: status
          description: >
            État de l'orientation (modération_en_cours, modération_rejetée, ouverte, refusée, validée).

      - name: orientations_rejectionreason
        description: >
          Table de correspondance id-label des motifs de refus des orientations refusées.
        columns:
        - name: id
          description: >
            Identifiant motif de refus. Correspondant à rejectionreason_id dans la table orientations_orientation_rejection_reasons.
        - name: label
          description: >
            Description textuelle du motif de refus.
        - name: value
          description: >
            Label textuel du motif de refus.

      - name: orientations_orientation_rejection_reasons
        description: >
          Motifs de refus des orientations refusées.
        columns:
        - name: id
          description: >
            Identifiant de la paire orientation refusée / motif de refus
        - name: orientation_id
          description: >
            Identifiant de l'orientation refusée.
        - name: value
          description: >
            Identifiant du motif de refus.

      - name: services_coachorientationmode
      - name: services_fundinglabel
        description: >
          Table de correspondance id-fundinglabel des labels de financement.

      - name: services_locationkind
        description: >
          Table de correspondance id-locationkind des services.
          Attention toutes les aides financières sont de type `à distance`.

      - name: services_savedsearch
        ToDo: à clarifier avec métier

      - name: services_service
        description: >
          Liste des services.
          Un service est rattaché à une structure (structure_id).
          Ne contient pas les services data inclusion qui sont eux récupérés via `fetch_and_export_di_data` dans les tables `di_structures` et `di_services`.
          Attention, les services data inclusion affichés sur DORA ne sont qu'un sous ensemble des services contenus dans la table di_services, car filtrés selon des règles de localisation ou de score de qualité.
        columns:
        - name: id
          description: >
            Identifiant du service.
        - name: creator_id
          description: >
            Identifiant de l'utilisateur ayant créé le service.
        - name: structure_id
          description: >
            Identifiant de la structure à laquelle le service est rattaché.
        - name: model_id
          description: >
            Identifiant du service modèle utilisé comme base pour le service (champs vide si aucun modèle utilisé).
        - name: is_model
          description: >
            Booleen à oui true si le service est un modèle. False sinon.

      - name: services_service_categories
        description: >
          Catégorie à laquelle un service est rattaché (mobilité, emploi, santé..).

      - name: services_servicecategory
        description: >
          Table de correspondance id-servicecategory.

      - name: services_service_coach_orientation_modes
        ToDo: à documenter avec le métier

      - name: services_coachorientationmodes
        ToDo: à documenter avec le métier

      - name: services_servicefee
      - name: services_service_funding_labels
        description: >
          Labels de financement des services financés.

      - name: services_service_location_kinds
        description: >
          Type de mise à disposition des services (à distance ou en présentiel).

      - name: services_servicesource
      - name: stats_deploymentstate
        description: >
          Etat de déploiement pour chaque département.
          Donnée complétée à la main sur l'admin par les bizdev en fonction du stade de maturité.
          Doc maturité : https://www.notion.so/gip-inclusion/Calcul-de-la-maturit-1995f321b6048092b876f7b08a87fa11

      - name: stats_dimobilisationevent
        description: >
          Événements de mobilisation (visualisation de fiche service ou d'informations de contact) sur les services data inclusion.

      - name: stats_dimobilisationevent_categories
        description: >
          Catégorie des services concernés par les événements de mobilisation.

      - name: stats_diserviceview
        description: >
          Événements de visualisation de services data inclusion.

      - name: stats_mobilisationevent
        description: >
          Événements de mobilisation des services dora.
        columns:
        - name: id
          description: >
            Identifiant de l'événement de mobilisation.
        - name: path
          description: >
            Slug de la page concernée.
        - name: date
          description: >
            Date de l'événement.
        - name: service_id
          description: >
            Identifiant du service concerné, clé primaire de la table service.
        - name: structure_id
          description: >
            Identifiant de la structure concernée, clé primaire de la table structure.
        - name: user_id
          description: >
            Si non vide, id de l'utilisateur connecté ayant réalisé la mobilisation.

      - name: stats_mobilisationevent_categories
        description:
          Catégorie des services concernés par les événements de mobilisation.

      - name: stats_pageview
        description: >
          Événements de visualisation d'une page sur dora (structure, service, page de connexion..).
        columns:
        - name: id
          description: >
            Identifiant de l'événement de visualisation d'une page.
        - name: path
          description: >
            Slug de la page concernée.
        - name: date
          description: >
            Date de la visualisation.
        - name: user_id
          description: >
            Si non vide, id de l'utilisateur connecté ayant réalisé la visualisation.

      - name: stats_searchview
        description: >
          Événements de recherche d'un service ou d'une structure.
          Attention, ici ne sont pas enregistrées les recherches réalisées avec la barre de recherche (nouvelle feature 2025).

      - name: stats_searchview_categories
        description: >
          Catégorie des services concernés par les événements de recherche.

      - name: stats_serviceview
        description: >
          Événements de visualisation d'une page service.

      - name: stats_structureinfosview
        description: >
          Événements de visualisation des informations d'une structure.

      - name: stats_structureview
        description: >
          Événements de visualisation d'une page structure.

      - name: structures_structure
        description: >
          Liste des structures.
        columns:
        - name: id
          description: >
            Identifiant de la structure.
        - name: creator_id
          description: >
            Identifiant de l'utilisateur ayant créé la structure.
        - name: typology
          description: >
            Typologie de la structure. Fiable pour CAP_EMPLOI, FT et ML.

      - name: structures_structuremember
        description: >
          Table de correspondance entre les utilisateurs et leur structures de rattachement pour les utilisateurs rattachés.
        columns:
        - name: is_admin
          description: >
            L'utilisateur a tous les droits sur la structure.
      - name: structures_structurenationallabel
        description: >
          Table de correspondance id-nationallabel.

      - name: structures_structure_national_labels
        description: >
          Labels nationaux des structures.

      - name: structures_structureputativemember
        description: >
          Table de correspondance entre les utilisateurs et leur structure potentielle, pour lesquels le rattachement n'est pas finalisé (invitation en attente ou demande de rattachement en attente)

      - name: structures_structuresource
      - name: structures_structuretypology
        description: >
          Typologie des structures (donnée déclarative, fiable pour FT, ML et les CD).

      - name: users_user
        description: >
          Liste des utilisateurs. On retrouve dans cette table les membres rattachés à une structure (table structures_structuremember), les membres potentiels d'une structure (structures_structureputativemember)
          ayant été invités par un gestionnaire de territoire mais l'invitation n'a pas encore été acceptée. Il y a aussi le cas d'utilisateurs ni membres ni membres potentiels, lorsque l'utilisateur n'a pas rejoint
          une structure juste après la création de son compte ou s'il a été modéré.
          Dans les analyses des utilisateurs Dora, on ne prend en compte que les utilisateurs qui ne sont pas de gestionnaire de territoire et qui sont rattachés à une structure.
        columns:
        - name: id
          description: >
            Identifiant de l'utilisateur.
        - name: password
          description: >
            Attention. Un mot de passe est automatiquement généré par le modèle django depuis 2025. Donc tous les utilisateurs, y compris ceux n'ayant pas encore réellement créé un compte, en ont un.
        - name: last_login
          description: >
            Date de dernière connexion. Lorsqu'elle est vide, l'utilisateur a été créé suite à un envoi d'invitation par une structure, mais n'a pas encore été activer son compte.
        - name: is_staff
          description: >
            Super utilisateur qui a tous les droits (Membres de la PDI).
        - name: is_active
          description: >
            L'utilisateur a le droit de se connecter à Dora. Par défaut, tous les utilisateurs sont actifs. Peuvent devenir inactif après demande de modération.
        - name: date_joined
          description: >
            Date de création du compte, que ce soit pas l'utilisateur lui même, ou par envoi d'une invitation.
        - name: is_valid
          description: >
            L'adresse email a été vérifiée (vérification avec pro connect).
        - name: is_manager
          description: >
            Utilisateurs qui ont le droits de gestionnaire de territoires sur les départements spécifiés.
        - name: main_activity
          description: >
            Distinction plus très utile aujourd'hui, et pas forcément fiable, car un accompagnateur peut être offreur.
            À valider avec métier mais sauf erreur, cette catégorie est choisie par l'utilisateur à la création du compte.
        - name: sub_pc
          description: >
            Identifiant pro connect.

      - name: logs_actionlog
        description: >
          Table contenant les connexions des utilisateurs sur les derniers trois mois

  - name: raw
    schema: raw
    description: "Tables contenant des données brutes"

    tables:
        - name: fagerh_reponses
          description: >
            Table avec les données brutes du questionnaire de Fagerh provenant de
